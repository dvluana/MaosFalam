<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MãosFalam</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Raleway:wght@200;300;400;500&family=JetBrains+Mono:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --black: #08050e;
        --deep: #0e0a18;
        --surface: #161030;
        --gold: #c9a24a;
        --gold-light: #d9b86a;
        --gold-dim: #7a6832;
        --bone: #e8dfd0;
        --bone-dim: #9b9284;
        --rose: #c4647a;
        --violet: #8b7bbf;
        --violet-dim: #4a3d6e;
        --velvet: #2a1840;
        --ember: #8b5a38;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Raleway", sans-serif;
        background: var(--black);
        color: var(--bone);
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
        overflow-y: hidden;
      }
      body.loaded {
        overflow-y: auto;
      }
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 100;
        opacity: 0.05;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      }

      /* ═══════════════════════════════════ */
      /* PRELOADER - CURTAIN + LIGHT        */
      /* ═══════════════════════════════════ */
      .preloader {
        position: fixed;
        inset: 0;
        z-index: 200;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--black);
        pointer-events: all;
      }
      /* Curtain halves */
      .curtain-left,
      .curtain-right {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 50%;
        background: var(--black);
        z-index: 202;
        transition: transform 1.4s cubic-bezier(0.76, 0, 0.24, 1);
      }
      .curtain-left {
        left: 0;
      }
      .curtain-right {
        right: 0;
      }
      .preloader.open .curtain-left {
        transform: translateX(-100%);
      }
      .preloader.open .curtain-right {
        transform: translateX(100%);
      }

      /* Curtain edge texture */
      .curtain-left::after,
      .curtain-right::before {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        width: 30px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(139, 123, 191, 0.03)
        );
      }
      .curtain-left::after {
        right: 0;
      }
      .curtain-right::before {
        left: 0;
        background: linear-gradient(
          270deg,
          transparent,
          rgba(139, 123, 191, 0.03)
        );
      }

      /* Center seam line where curtains meet */
      .curtain-seam {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 50%;
        width: 1px;
        background: rgba(201, 162, 74, 0.06);
        z-index: 203;
        transition: opacity 0.6s ease;
      }
      .preloader.open .curtain-seam {
        opacity: 0;
      }

      /* Light point at top */
      .light-point {
        position: absolute;
        top: 8%;
        left: 50%;
        transform: translateX(-50%);
        width: 4px;
        height: 4px;
        background: var(--gold);
        border-radius: 50%;
        z-index: 204;
        opacity: 0;
        box-shadow: 0 0 20px rgba(201, 162, 74, 0.3);
        animation: lightAppear 1.5s ease-out 0.5s forwards;
      }
      @keyframes lightAppear {
        0% {
          opacity: 0;
          width: 4px;
          height: 4px;
          box-shadow: 0 0 10px rgba(201, 162, 74, 0.1);
        }
        40% {
          opacity: 1;
          width: 6px;
          height: 6px;
          box-shadow: 0 0 40px rgba(201, 162, 74, 0.4);
        }
        100% {
          opacity: 1;
          width: 6px;
          height: 6px;
          box-shadow:
            0 0 60px rgba(201, 162, 74, 0.5),
            0 0 200px rgba(201, 162, 74, 0.15);
        }
      }

      /* Light cone spreading down from the point */
      .light-cone {
        position: absolute;
        top: 8%;
        left: 50%;
        transform: translateX(-50%);
        width: 0;
        height: 0;
        z-index: 201;
        opacity: 0;
        background: radial-gradient(
          ellipse at 50% 0%,
          rgba(201, 162, 74, 0.08) 0%,
          rgba(139, 123, 191, 0.04) 30%,
          transparent 70%
        );
        animation: coneSpread 2.5s ease-out 1.2s forwards;
      }
      @keyframes coneSpread {
        0% {
          opacity: 0;
          width: 20px;
          height: 40px;
        }
        50% {
          opacity: 1;
          width: 300px;
          height: 500px;
        }
        100% {
          opacity: 1;
          width: 120vw;
          height: 120vh;
        }
      }

      /* Symbol in center while loading */
      .preloader-symbol {
        position: relative;
        z-index: 205;
        opacity: 0;
        animation: symbolIn 1s ease-out 0.8s forwards;
      }
      @keyframes symbolIn {
        0% {
          opacity: 0;
          transform: scale(0.8);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }
      .preloader-symbol svg {
        filter: drop-shadow(0 0 20px rgba(201, 162, 74, 0.2));
      }
      .preloader-text {
        position: relative;
        z-index: 205;
        font-family: "Cormorant Garamond", serif;
        font-size: 14px;
        font-weight: 300;
        font-style: italic;
        color: var(--bone-dim);
        letter-spacing: 0.04em;
        margin-top: 20px;
        opacity: 0;
        animation: textFadeIn 1s ease-out 1.5s forwards;
      }
      @keyframes textFadeIn {
        to {
          opacity: 1;
        }
      }

      /* After curtains open, fade the preloader away */
      .preloader.fade {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.8s ease 0.5s;
      }

      /* ═══════════════════════════════════ */
      /* NAV                                 */
      /* ═══════════════════════════════════ */
      .nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 50;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 28px;
        background: linear-gradient(180deg, rgba(8, 5, 14, 0.8), transparent);
        opacity: 0;
        transition: opacity 0.6s ease;
      }
      .nav.show {
        opacity: 1;
      }
      .nav-logo svg {
        filter: drop-shadow(0 0 12px rgba(201, 162, 74, 0.1));
      }
      .nav-menu {
        width: 32px;
        height: 32px;
        border: 1px solid rgba(201, 162, 74, 0.08);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        cursor: pointer;
        transition: border-color 0.3s;
      }
      .nav-menu:hover {
        border-color: rgba(201, 162, 74, 0.2);
      }
      .nav-menu span {
        display: block;
        height: 1px;
        background: var(--gold-dim);
      }
      .nav-menu span:nth-child(1) {
        width: 16px;
      }
      .nav-menu span:nth-child(2) {
        width: 12px;
      }
      .nav-menu span:nth-child(3) {
        width: 8px;
      }

      /* ═══════════════════════════════════ */
      /* HERO                                */
      /* ═══════════════════════════════════ */
      .hero {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        padding: 80px 24px 60px;
        overflow: hidden;
        opacity: 0;
        transition: opacity 1s ease;
      }
      .hero.show {
        opacity: 1;
      }
      .hero::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(
            ellipse 600px 400px at 50% 35%,
            rgba(139, 123, 191, 0.1) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 400px 300px at 30% 60%,
            rgba(139, 123, 191, 0.06) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 500px 400px at 65% 50%,
            rgba(201, 162, 74, 0.04) 0%,
            transparent 70%
          );
      }
      .hero::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.08;
        background-image: url("data:image/svg+xml,%3Csvg width='500' height='500' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='a'%3E%3CfeTurbulence baseFrequency='0.6' numOctaves='5' type='fractalNoise' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23a)'/%3E%3C/svg%3E");
      }

      .diorama-wrap {
        position: relative;
        z-index: 2;
        width: min(420px, 85vw);
        margin-bottom: 28px;
      }
      .diorama-glow {
        position: absolute;
        inset: -60px;
        background: radial-gradient(
          ellipse 100% 80% at 50% 55%,
          rgba(139, 123, 191, 0.12) 0%,
          transparent 65%
        );
        animation: glowPulse 5s ease-in-out infinite;
        pointer-events: none;
      }
      @keyframes glowPulse {
        0%,
        100% {
          opacity: 0.5;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.03);
        }
      }
      .diorama-img {
        width: 100%;
        display: block;
        position: relative;
        z-index: 1;
        filter: drop-shadow(0 20px 60px rgba(0, 0, 0, 0.5));
      }

      .hero-content {
        position: relative;
        z-index: 3;
        text-align: center;
      }
      .tagline {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(20px, 4vw, 28px);
        font-weight: 300;
        font-style: italic;
        color: var(--bone);
        letter-spacing: 0.04em;
        line-height: 1.35;
        max-width: 400px;
        margin: 0 auto;
      }
      .orn {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 60px;
        margin: 24px auto;
      }
      .orn::before,
      .orn::after {
        content: "";
        flex: 1;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--gold-dim),
          transparent
        );
      }
      .orn-d {
        width: 4px;
        height: 4px;
        background: var(--gold);
        transform: rotate(45deg);
        flex-shrink: 0;
      }
      .cta-btn {
        display: inline-block;
        padding: 16px 48px;
        background: linear-gradient(160deg, #1a1035, #2a1840, #1a1035);
        color: var(--bone);
        font-family: "Raleway", sans-serif;
        font-size: 11px;
        font-weight: 400;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        text-decoration: none;
        border-radius: 0 6px 0 6px;
        position: relative;
        box-shadow:
          0 0 0 1px rgba(201, 162, 74, 0.1),
          0 0 30px rgba(139, 123, 191, 0.1);
        transition: all 0.4s;
        cursor: pointer;
        border: none;
      }
      .cta-btn::before,
      .cta-btn::after {
        content: "";
        position: absolute;
        width: 8px;
        height: 8px;
        border-color: rgba(201, 162, 74, 0.25);
        border-style: solid;
        transition: all 0.3s;
      }
      .cta-btn::before {
        top: -1px;
        left: -1px;
        border-width: 1px 0 0 1px;
      }
      .cta-btn::after {
        bottom: -1px;
        right: -1px;
        border-width: 0 1px 1px 0;
      }
      .cta-btn:hover {
        box-shadow:
          0 0 0 1px rgba(201, 162, 74, 0.2),
          0 0 50px rgba(139, 123, 191, 0.2);
        transform: translateY(-2px);
      }
      .cta-btn:hover::before,
      .cta-btn:hover::after {
        width: 14px;
        height: 14px;
        border-color: rgba(201, 162, 74, 0.4);
      }
      .ghost-text {
        font-family: "Cormorant Garamond", serif;
        font-size: 13px;
        font-style: italic;
        color: var(--bone-dim);
        letter-spacing: 0.03em;
        margin-top: 14px;
      }

      .particle {
        position: absolute;
        width: 2px;
        height: 2px;
        border-radius: 50%;
        z-index: 1;
      }
      .p1 {
        top: 12%;
        left: 18%;
        background: var(--gold);
        animation: float 6s ease-in-out infinite;
      }
      .p2 {
        top: 22%;
        right: 15%;
        background: var(--violet);
        animation: float 5s ease-in-out infinite 1s;
      }
      .p3 {
        bottom: 25%;
        left: 22%;
        background: var(--gold);
        animation: float 7s ease-in-out infinite 2s;
      }
      .p4 {
        top: 38%;
        right: 12%;
        background: var(--violet);
        width: 1.5px;
        height: 1.5px;
        animation: float 4.5s ease-in-out infinite 0.5s;
      }
      .p5 {
        bottom: 35%;
        right: 25%;
        background: var(--gold);
        width: 1px;
        height: 1px;
        animation: float 6s ease-in-out infinite 3s;
      }
      @keyframes float {
        0%,
        100% {
          opacity: 0.1;
          transform: translateY(0);
        }
        50% {
          opacity: 0.45;
          transform: translateY(-14px);
        }
      }

      @media (max-width: 480px) {
        .diorama-wrap {
          width: 90vw;
        }
        .nav {
          padding: 16px 20px;
        }
      }
    </style>
  </head>
  <body>
    <!-- PRELOADER -->

      <div class="curtain-left"></div>
      <div class="curtain-right"></div>
      <div class="curtain-seam"></div>
      <div class="light-point"></div>
      <div class="light-cone"></div>

      <div class="preloader-symbol">
        <svg
          width="60"
          viewBox="0 0 613 366"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >

          />
        </svg>
      </div>
      <div class="preloader-text">Suas mãos já sabem...</div>
    </div>

    <!-- NAV -->
    <div class="nav" id="nav">
      <div class="nav-logo">
        <svg
          width="110"
          viewBox="0 0 613 366"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            fill-rule="evenodd"
            clip-rule="evenodd"

          <path
            d="M174.092 27.061C216.082 5.198 264.16-3.393 311.107 1.2C385.635 7.242 445.195 45.298 492.124 101.452C517.484 131.787 543.237 164.456 573.822 189.931C585.854 199.957 597.257 203.796 612.029 208.232C589.528 208.793 569.548 204.094 548.51 196.162C525.939 187.769 504.902 175.732 486.241 160.537C441.876 124.183 412.773 75.612 354.471 53.625C284.215 27.133 207.402 44.015 154.972 97.537C131.109 121.896 112.03 148.118 86.776 170.051C60.877 192.542 30.905 204.67 0 218.127C13.719 208.345 26.438 181.177 37.791 169.08C82.573 121.359 113.787 58.461 174.092 27.061Z"
            fill="#C9A24A"
          />
        </svg>
      </div>
      <div class="nav-menu"><span></span><span></span><span></span></div>
    </div>

    <!-- HERO -->
    <div class="hero" id="hero">
      <div class="particle p1"></div>
      <div class="particle p2"></div>
      <div class="particle p3"></div>
      <div class="particle p4"></div>
      <div class="particle p5"></div>

      <div class="diorama-wrap">
        <div class="diorama-glow"></div>
        <img src="mao-semfundo.png"
          alt="MãosFalam"
          class="diorama-img"
        />
      </div>

      <div class="hero-content">
        <div class="tagline">
          Me mostre sua mão<br />e eu te conto quem você é
        </div>
        <div class="orn"><div class="orn-d"></div></div>
        <button class="cta-btn">Começar leitura</button>
        <div class="ghost-text">Grátis · 30 segundos</div>
      </div>
    </div>

    <script>
      // Preloader sequence
      const pre = document.getElementById("preloader");
      const nav = document.getElementById("nav");
      const hero = document.getElementById("hero");

      // 1. Light appears (CSS handles 0-2s)
      // 2. Curtains open at 3s
      setTimeout(() => {
        pre.classList.add("open");
      }, 3000);

      // 3. Show hero behind curtains as they slide
      setTimeout(() => {
        hero.classList.add("show");
      }, 3200);

      // 4. Show nav
      setTimeout(() => {
        nav.classList.add("show");
      }, 3800);

      // 5. Fade preloader remnants and unlock scroll
      setTimeout(() => {
        pre.classList.add("fade");
        document.body.classList.add("loaded");
      }, 4400);

      // 6. Remove preloader from DOM
      setTimeout(() => {
        pre.style.display = "none";
      }, 5500);
    </script>
  </body>
</html>
