    <script>
      /* ══════════════════════════════════════════════════════════
         VELVET CURTAIN — canvas cloth simulation
         ══════════════════════════════════════════════════════════ */
      class VelvetCurtain {
        constructor(canvas, side) {
          this.canvas = canvas;
          this.ctx    = canvas.getContext('2d');
          this.side   = side;
          const isMob = window.innerWidth <= 480;
          this.FOLDS  = isMob ? 5 : 9;
          this.ROWS   = isMob ? 42 : 52;
          this.t = 0; this.openP = 0; this.antP = 0;
          this.opening = false; this.anticipating = false; this.alive = true;
          this._resize();
          window.addEventListener('resize', () => this._resize());
          requestAnimationFrame(ts => this._loop(ts));
        }
        _resize() {
          const dpr = window.devicePixelRatio || 1;
          this.canvas.width  = this.canvas.offsetWidth  * dpr;
          this.canvas.height = this.canvas.offsetHeight * dpr;
          this.W = this.canvas.width; this.H = this.canvas.height;
        }
        _cx(c, yF, t) {
          const W = this.W, total = this.FOLDS * 2 + 1;
          const base = (c / total) * W;
          // ef: how close to the free edge (0=anchored wall, 1=free center edge)
          const ef = this.side === 'left' ? c / total : 1 - c / total;
          // anticipation shimmer — free edge shakes more
          const ant = Math.sin(t * 13 + c * 1.05) * this.antP * 7 * ef;
          // three-frequency sway for organic breath — dies as curtain opens
          const sa  = (1.6 + ef * 2.6) * (1 - this.openP);
          const sway = Math.sin(t * 0.44 + c * 0.68) * sa
                     + Math.sin(t * 0.87 + c * 1.22) * sa * 0.40
                     + Math.sin(t * 1.51 + c * 0.48) * sa * 0.18;
          let openX = 0;
          if (this.openP > 0) {
            const eased = 1 - Math.pow(1 - this.openP, 3);
            openX = (this.side === 'left' ? -1 : 1) * eased * W * 1.12;
          }
          return base + ant + sway + openX;
        }
        _draw(t) {
          const ctx = this.ctx, W = this.W, H = this.H;
          ctx.clearRect(0, 0, W, H);
          const total = this.FOLDS * 2 + 1;

          for (let c = 0; c < total - 1; c++) {
            const isPeak = c % 2 === 0;
            const Lx = [], Rx = [];
            for (let r = 0; r <= this.ROWS; r++) {
              const yF = r / this.ROWS;
              Lx.push(this._cx(c, yF, t));
              Rx.push(this._cx(c + 1, yF, t));
            }

            ctx.beginPath();
            ctx.moveTo(Lx[0], 0);
            for (let r = 1; r <= this.ROWS; r++) ctx.lineTo(Lx[r], (r / this.ROWS) * H);
            for (let r = this.ROWS; r >= 0; r--) ctx.lineTo(Rx[r], (r / this.ROWS) * H);
            ctx.closePath();

            const g = ctx.createLinearGradient(this._cx(c, 0.5, t), 0, this._cx(c + 1, 0.5, t), 0);
            if (isPeak) {
              g.addColorStop(0,   'rgba(3,2,5,1)');
              g.addColorStop(0.3, 'rgba(12,8,16,1)');
              g.addColorStop(0.5, 'rgba(16,10,20,1)');
              g.addColorStop(0.7, 'rgba(12,8,16,1)');
              g.addColorStop(1,   'rgba(3,2,5,1)');
            } else {
              g.addColorStop(0,   'rgba(2,1,3,1)');
              g.addColorStop(0.5, 'rgba(2,1,4,1)');
              g.addColorStop(1,   'rgba(2,1,3,1)');
            }
            ctx.fillStyle = g;
            ctx.fill();
          }

          // top shadow + bottom vignette
          const dg = ctx.createLinearGradient(0, 0, 0, H);
          dg.addColorStop(0,    'rgba(0,0,0,0.72)');
          dg.addColorStop(0.06, 'rgba(0,0,0,0)');
          dg.addColorStop(0.80, 'rgba(0,0,0,0)');
          dg.addColorStop(1,    'rgba(0,0,0,0.90)');
          ctx.fillStyle = dg;
          ctx.fillRect(0, 0, W, H);

          ctx.globalAlpha = 0.6;
          for (let x = 0; x < W; x += 9) {
            ctx.fillStyle = x % 18 === 0 ? 'rgba(160,122,44,0.85)' : 'rgba(90,68,22,0.7)';
            ctx.fillRect(x, H - 20, 1.4, 20);
          }
          ctx.globalAlpha = 1;
        }
        _loop(ts) {
          this.t = ts * 0.001;
          if (this.anticipating && this.antP < 1)       this.antP = Math.min(1, this.antP + 0.045);
          else if (!this.anticipating && this.antP > 0) this.antP = Math.max(0, this.antP - 0.018);
          // slower open — majestic sweep
          if (this.opening && this.openP < 1) this.openP = Math.min(1, this.openP + 0.0065);
          this._draw(this.t);
          if (this.alive) requestAnimationFrame(ts => this._loop(ts));
        }
        open() {
          this.anticipating = true;
          // longer anticipation breath before sweeping open
          setTimeout(() => { this.anticipating = false; this.opening = true; }, 820);
        }
      }

      /* ── ELEMENTS ── */
      const curtL      = new VelvetCurtain(document.getElementById('canvasLeft'),  'left');
      const curtR      = new VelvetCurtain(document.getElementById('canvasRight'), 'right');
      const pre        = document.getElementById('preloader');
      const nav        = document.getElementById('nav');
      const stageDark  = document.getElementById('stageDark');
      const lampWrap   = document.getElementById('lampWrap');
      const lampBulb   = document.getElementById('lampBulb');
      const lampCone   = document.getElementById('lampCone');
      const lampAmbient= document.getElementById('lampAmbient');
      const lampHalo   = document.getElementById('lampHalo');
      const vignette   = document.getElementById('sceneVignette');

      /* ── SEQUENCE ─────────────────────────────────────────────
         t=0.8s   lamp fixture ghosts in (fixture + halo)
         t=1.8s   bulb begins dim warm-up + cone starts
         t=2.2s   curtains open (anticipation 820ms → sweep at ~3.0s)
         t=2.4s   stage-dark begins slow fade — light bleeds through
                  as curtains part; scene emerges organically
         t=5.2s   vignette frames the scene
         t=6.2s   nav appears
         t=5.0s   bulb warm-up completes → idle flicker
         t=7.2s   curtains fade (scene fully revealed)
         t=8.2s   cleanup
         ───────────────────────────────────────────────────────── */

      // t=0.8s  fixture + halo appear (lamp is already there, just waking)
      setTimeout(() => {
        lampWrap.classList.add('on');
        lampHalo.classList.add('on');
      }, 800);

      // t=1.8s  bulb starts warming + cone begins
      setTimeout(() => {
        lampBulb.classList.add('ignite');
        lampCone.classList.add('on');
      }, 1800);

      // t=2.2s  curtains begin their sweep
      setTimeout(() => { curtL.open(); curtR.open(); }, 2200);

      // t=2.4s  darkness lifts gradually — synced with curtain parting
      // scene reveals as curtains open, not after
      setTimeout(() => {
        stageDark.style.transition = 'opacity 4.4s cubic-bezier(0.28, 0, 0.08, 1)';
        stageDark.style.opacity = '0';
      }, 2400);

      // t=5.2s  vignette
      setTimeout(() => vignette.classList.add('show'), 5200);

      // t=6.2s  nav
      setTimeout(() => nav.classList.add('show'), 6200);

      // t=1.8s + 3.2s = 5.0s  bulb warm-up done → idle flicker
      setTimeout(() => {
        lampBulb.classList.remove('ignite');
        lampBulb.classList.add('steady');
      }, 5000);

      // t=7.2s  curtains fade out
      setTimeout(() => { pre.classList.add('fade'); document.body.classList.add('loaded'); }, 7200);

      // t=8.2s  remove preloader + kill curtain RAF loops
      setTimeout(() => {
        pre.style.display = 'none';
        curtL.alive = false;
        curtR.alive = false;
      }, 8500);

      // slow video
      document.querySelector('.diorama-img').playbackRate = 0.6;

      /* ── LOGO REVEAL in the black gap after curtains open ── */
      // t=3.2s: logo materializes (curtains opened enough, stage-dark still ~85% dark)
      setTimeout(() => {
        const lr = document.getElementById('logoReveal');
        if (lr) lr.classList.add('visible');
      }, 3200);

      // t=5.3s: logo flares out (stage-dark ~65% faded, scene starting to emerge)
      setTimeout(() => {
        const lr = document.getElementById('logoReveal');
        if (lr) {
          // switch to idle pulse briefly before exit
          const svg = lr.querySelector('svg');
          if (svg) svg.style.animation = 'lrLogoPulse 1.8s ease-in-out infinite';
        }
      }, 4600);

      setTimeout(() => {
        const lr = document.getElementById('logoReveal');
        if (lr) {
          lr.classList.remove('visible');
          lr.classList.add('hiding');
        }
      }, 5200);

      setTimeout(() => {
        const lr = document.getElementById('logoReveal');
        if (lr) lr.remove();
      }, 6100);

      /* ── TYPEWRITER — título e subtítulo ── */
      (function () {
        const titleEl    = document.getElementById('heroTitle');
        const subtitleEl = document.getElementById('heroSubtitle');
        const cursor     = document.getElementById('typeCursor');
        const TITLE_1 = 'Suas mãos já sabem.';
        const TITLE_2 = 'Você ainda não.';
        const SUB     = 'Uma foto. 30 segundos. E eu te conto o que você esconde de todo mundo.';

        function typeChars(el, text, base, variance) {
          return new Promise(resolve => {
            let i = 0;
            function next() {
              if (i >= text.length) { resolve(); return; }
              const ch = text[i++];
              const span = document.createElement('span');
              span.className = 'type-char';
              span.textContent = ch;
              el.insertBefore(span, cursor);
              requestAnimationFrame(() => requestAnimationFrame(() => span.classList.add('visible')));
              let wait = base + Math.random() * variance;
              if (ch === '.')      wait += 460;
              else if (ch === ',') wait += 180;
              else if (ch === ' ') wait -= 10;
              setTimeout(next, wait);
            }
            next();
          });
        }

        async function run() {
          await typeChars(titleEl, TITLE_1, 52, 48);
          // quebra de linha entre as duas frases
          const br = document.createElement('br');
          titleEl.insertBefore(br, cursor);
          await new Promise(r => setTimeout(r, 480));
          await typeChars(titleEl, TITLE_2, 52, 48);
          await new Promise(r => setTimeout(r, 1100));
          cursor.classList.add('done');
          subtitleEl.textContent = SUB;
          await new Promise(r => setTimeout(r, 80));
          subtitleEl.classList.add('show');
        }

        // start after curtains fade + scene is pristine
        setTimeout(run, 8300);
      })();

      /* ── EMBER PARTICLES near video ── */
      (function() {
        const wrap = document.querySelector('.diorama-wrap');
        if (!wrap) return;
        const cols = ['rgba(201,162,74,','rgba(228,192,80,','rgba(255,215,90,','rgba(180,130,50,'];
        function emit() {
          const p = document.createElement('div');
          const sz = Math.random() * 2.2 + 0.6;
          const x  = 15 + Math.random() * 70;
          const dur= 3500 + Math.random() * 4000;
          const dx = (Math.random() - 0.5) * 38;
          const c  = cols[Math.floor(Math.random() * cols.length)];
          const a  = 0.55 + Math.random() * 0.45;
          p.style.cssText = `position:absolute;width:${sz}px;height:${sz}px;border-radius:50%;left:${x}%;bottom:4px;background:${c}${a});box-shadow:0 0 ${sz*5}px ${c}0.9), 0 0 ${sz*10}px ${c}0.5);pointer-events:none;z-index:5;`;
          wrap.appendChild(p);
          p.animate([
            {transform:'translate(0,0) scale(1)',opacity:0},
            {transform:`translate(${dx*.3}px,-28px) scale(1.6)`,opacity:1,offset:.18},
            {transform:`translate(${dx}px,-90px) scale(1.1)`,opacity:a,offset:.55},
            {transform:`translate(${dx*1.5}px,-160px) scale(.4)`,opacity:0}
          ],{duration:dur,easing:'ease-out',fill:'forwards'}).onfinish=()=>p.remove();
        }
        setTimeout(()=>{ emit(); setInterval(emit, 700); }, 6800);
      })();
    </script>

    <script>
    /* ══════════════════════════════════════════════════════════════
       EFFECT 1 — CINEMATIC GRAIN (animated ImageData noise)
       ══════════════════════════════════════════════════════════════ */
    (function() {
      const canvas = document.getElementById('grainCanvas');
      const ctx = canvas.getContext('2d');
      let W, H, frame = 0;

      function resize() {
        // Draw at capped resolution (max 400px wide) — CSS scales up.
        // Avoids 2.7M-pixel fills on Retina/mobile DPR screens.
        const scale = Math.min(1, 400 / window.innerWidth);
        W = canvas.width  = Math.ceil(window.innerWidth  * scale);
        H = canvas.height = Math.ceil(window.innerHeight * scale);
        canvas.style.width  = window.innerWidth  + 'px';
        canvas.style.height = window.innerHeight + 'px';
      }

      function drawGrain() {
        const imageData = ctx.createImageData(W, H);
        const data = imageData.data;
        const len = data.length;
        for (let i = 0; i < len; i += 4) {
          const v = (Math.random() * 255) | 0;
          data[i] = data[i+1] = data[i+2] = v;
          data[i + 3] = (18 + Math.random() * 4) | 0;
        }
        ctx.putImageData(imageData, 0, 0);
      }

      function loop() {
        drawGrain();
        setTimeout(loop, 80); // ~12fps — imperceptível para grain
      }

      resize();
      window.addEventListener('resize', resize);
      loop();
    })();

    /* ══════════════════════════════════════════════════════════════
       EFFECT 2 — TILT MAGNÉTICO NO VÍDEO (3D parallax)
       ══════════════════════════════════════════════════════════════ */
    (function() {
      const wrap = document.querySelector('.diorama-wrap');
      if (!wrap) return;

      let targetX = 0, targetY = 0;
      let currentX = 0, currentY = 0;
      const LERP = 0.06;
      const MAX_X = 6;  // deg rotateX
      const MAX_Y = 9;  // deg rotateY

      // Set perspective on parent (hero)
      const hero = document.getElementById('hero');
      if (hero) hero.style.perspective = '900px';

      function lerp(a, b, t) { return a + (b - a) * t; }

      function tick() {
        currentX = lerp(currentX, targetX, LERP);
        currentY = lerp(currentY, targetY, LERP);
        wrap.style.transform = `rotateX(${currentX.toFixed(3)}deg) rotateY(${currentY.toFixed(3)}deg)`;
        requestAnimationFrame(tick);
      }

      document.addEventListener('mousemove', function(e) {
        const cx = window.innerWidth  / 2;
        const cy = window.innerHeight / 2;
        // normalize [-1,1]
        const nx = (e.clientX - cx) / cx;
        const ny = (e.clientY - cy) / cy;
        // rotateX: mouse up → tilt top toward viewer (positive)
        targetX = -ny * MAX_X;
        targetY =  nx * MAX_Y;
      });

      // Mobile: deviceorientation
      if (window.DeviceOrientationEvent) {
        window.addEventListener('deviceorientation', function(e) {
          if (e.beta == null || e.gamma == null) return;
          const nx = Math.max(-1, Math.min(1, e.gamma / 30));
          const ny = Math.max(-1, Math.min(1, (e.beta - 45) / 30));
          targetX = -ny * (MAX_X * 0.5);
          targetY =  nx * (MAX_Y * 0.5);
        });
      }

      requestAnimationFrame(tick);
    })();

    /* ══════════════════════════════════════════════════════════════
       EFFECT 3 — PRESSÁGIOS EMERGENTES
       ══════════════════════════════════════════════════════════════ */
    (function() {
      const words = ['REVELAÇÃO','SEGREDO','VEM','SABE','VEJO','SEMPRE','NUNCA','AGORA','ESPERA','SINTO'];
      const MARGIN = 0.15;

      function showPressagio() {
        const word = words[Math.floor(Math.random() * words.length)];
        const el = document.createElement('span');
        el.className = 'pressagio';
        el.textContent = word;

        const mobile = window.innerWidth < 480;
        // Em mobile: evita topo (nav), meio (hero content) e rodapé (clock/audio)
        const topMin  = mobile ? 0.08 : MARGIN;
        const topMax  = mobile ? 0.35 : 1 - MARGIN * 2; // só aparece na metade superior
        const leftMax = mobile ? 0.55 : 1 - MARGIN * 2; // evita borda direita em telas estreitas
        const left = MARGIN + Math.random() * leftMax;
        const top  = topMin  + Math.random() * (topMax - topMin);
        el.style.left = (left * 100).toFixed(1) + '%';
        el.style.top  = (top  * 100).toFixed(1) + '%';

        document.body.appendChild(el);

        // fade in
        requestAnimationFrame(() => {
          el.classList.add('fade-in');
        });

        // fade out after fade-in(2s) + stay(3s) = 5s
        setTimeout(() => {
          el.classList.remove('fade-in');
          el.classList.add('fade-out');
          setTimeout(() => el.remove(), 2000);
        }, 5000);

        // schedule next
        const next = 18000 + Math.random() * 7000;
        setTimeout(showPressagio, next);
      }

      // start after 12s
      setTimeout(showPressagio, 12000);
    })();

    /* ══════════════════════════════════════════════════════════════
       EFFECT 4 — TEXTO QUE SE DISSOLVE EM FUMAÇA
       ══════════════════════════════════════════════════════════════ */
    (function() {
      function dissolveAndReform() {
        const cursor = document.getElementById('typeCursor');
        if (!cursor || !cursor.classList.contains('done')) {
          // typewriter not done yet, try again later
          setTimeout(dissolveAndReform, 5000);
          return;
        }

        const titleEl = document.getElementById('heroTitle');
        const chars = Array.from(titleEl.querySelectorAll('.type-char'));
        if (chars.length === 0) {
          setTimeout(dissolveAndReform, 40000);
          return;
        }

        // Dissolve: scatter each char with random translate + blur
        chars.forEach((ch, i) => {
          setTimeout(() => {
            const dx = (Math.random() - 0.5) * 30;
            const dy = (Math.random() - 0.5) * 20;
            ch.style.transition = 'opacity 0.7s ease, filter 0.7s ease, transform 0.7s ease';
            ch.style.transform  = `translate(${dx}px, ${dy}px)`;
            ch.style.opacity    = '0';
            ch.style.filter     = 'blur(8px)';
          }, i * 30);
        });

        // Reconstitute in reverse order after 1.5s
        const totalDissolve = chars.length * 30 + 700;
        setTimeout(() => {
          const reversed = [...chars].reverse();
          reversed.forEach((ch, i) => {
            setTimeout(() => {
              ch.style.transition = 'opacity 0.6s ease, filter 0.6s ease, transform 0.6s ease';
              ch.style.transform  = '';
              ch.style.opacity    = '1';
              ch.style.filter     = 'blur(0)';
            }, i * 28);
          });
        }, totalDissolve + 500);

        // Schedule next dissolve after 40s
        setTimeout(dissolveAndReform, 40000);
      }

      // Start after 20s
      setTimeout(dissolveAndReform, 20000);
    })();

    /* ══════════════════════════════════════════════════════════════
       EFFECT 5 — CONSTELAÇÕES NO FUNDO
       ══════════════════════════════════════════════════════════════ */
    (function() {
      const canvas = document.getElementById('constellationCanvas');
      const ctx = canvas.getContext('2d');
      let W, H;
      const isMobile = window.innerWidth < 480;
      const NUM_STARS = isMobile ? 25 : 55;
      const LINK_DIST = isMobile ? 80  : 120;
      let stars = [], constFrame = 0;

      function resize() {
        const dpr = window.devicePixelRatio || 1;
        W = canvas.width  = Math.ceil(window.innerWidth  * dpr);
        H = canvas.height = Math.ceil(window.innerHeight * dpr);
        canvas.style.width  = window.innerWidth  + 'px';
        canvas.style.height = window.innerHeight + 'px';
        // rescale star positions if already created
        if (stars.length) {
          stars.forEach(s => {
            s.x = s.rx * W;
            s.y = s.ry * H;
          });
        }
      }

      function createStars() {
        stars = [];
        for (let i = 0; i < NUM_STARS; i++) {
          const rx = Math.random();
          const ry = Math.random();
          stars.push({
            rx, ry,
            x: rx * W, y: ry * H,
            r: 0.5 + Math.random() * 1.3,
            base_opacity: 0.1 + Math.random() * 0.4,
            pulse_speed: 0.004 + Math.random() * 0.008,
            pulse_offset: Math.random() * Math.PI * 2,
            vx: (Math.random() - 0.5) * 0.12,
            vy: (Math.random() - 0.5) * 0.12,
          });
        }
      }

      function draw(ts) {
        constFrame++;
        if (isMobile && constFrame % 2 !== 0) { requestAnimationFrame(draw); return; }
        ctx.clearRect(0, 0, W, H);
        const t = ts * 0.001;

        // update positions
        stars.forEach(s => {
          s.x += s.vx;
          s.y += s.vy;
          // bounce
          if (s.x < 0)  { s.x = 0;  s.vx *= -1; }
          if (s.x > W)  { s.x = W;  s.vx *= -1; }
          if (s.y < 0)  { s.y = 0;  s.vy *= -1; }
          if (s.y > H)  { s.y = H;  s.vy *= -1; }
          // update relative position for resize
          s.rx = s.x / W;
          s.ry = s.y / H;
        });

        // draw connections
        for (let i = 0; i < stars.length; i++) {
          for (let j = i + 1; j < stars.length; j++) {
            const dx = stars[i].x - stars[j].x;
            const dy = stars[i].y - stars[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < LINK_DIST) {
              const alpha = (1 - dist / LINK_DIST) * 0.06;
              ctx.beginPath();
              ctx.moveTo(stars[i].x, stars[i].y);
              ctx.lineTo(stars[j].x, stars[j].y);
              ctx.strokeStyle = `rgba(201,162,74,${alpha.toFixed(3)})`;
              ctx.lineWidth = 0.4;
              ctx.stroke();
            }
          }
        }

        // draw stars
        stars.forEach(s => {
          const pulse = 0.5 + 0.5 * Math.sin(t * s.pulse_speed * 1000 + s.pulse_offset);
          const opacity = s.base_opacity * (0.6 + 0.4 * pulse);
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(201,162,74,${opacity.toFixed(3)})`;
          ctx.fill();
        });

        requestAnimationFrame(draw);
      }

      resize();
      createStars();
      window.addEventListener('resize', () => {
        resize();
      });
      requestAnimationFrame(draw);
    })();

    /* ══════════════════════════════════════════════════════════════
       EFFECT 6 — CURSOR DE CRISTAL COM DISTORÇÃO
       ══════════════════════════════════════════════════════════════ */
    (function() {
      const cursor = document.getElementById('crystalCursor');
      if (!cursor) return;

      let mouseX = -200, mouseY = -200;
      let curX = -200, curY = -200;
      const LERP = 0.12;

      function lerp(a, b, t) { return a + (b - a) * t; }

      document.addEventListener('mousemove', function(e) {
        mouseX = e.clientX;
        mouseY = e.clientY;
      });

      // expand on clickable elements
      const clickables = 'button, a, [role="button"], input, select, label';
      document.addEventListener('mouseover', function(e) {
        if (e.target.closest(clickables)) {
          cursor.classList.add('expanded');
        }
      });
      document.addEventListener('mouseout', function(e) {
        if (e.target.closest(clickables)) {
          cursor.classList.remove('expanded');
        }
      });

      // hide cursor when it leaves the window
      document.addEventListener('mouseleave', () => cursor.style.opacity = '0');
      document.addEventListener('mouseenter', () => cursor.style.opacity = '1');

      function tick() {
        curX = lerp(curX, mouseX, LERP);
        curY = lerp(curY, mouseY, LERP);
        cursor.style.left = curX.toFixed(2) + 'px';
        cursor.style.top  = curY.toFixed(2) + 'px';
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);

      // hide cursor on mobile (touch devices)
      window.addEventListener('touchstart', () => cursor.style.display = 'none', { once: true });
    })();

    /* ══════════════════════════════════════════════════════════════
       EFFECT 7 — ÁUDIO AMBIENTE OPT-IN
       ══════════════════════════════════════════════════════════════ */
    (function() {
      const btn = document.getElementById('audioToggle');
      if (!btn) return;

      let audioCtx = null;
      let nodes = [];
      let active = false;

      function createPinkNoise(ctx) {
        const bufSize = ctx.sampleRate * 2;
        const buffer = ctx.createBuffer(1, bufSize, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
        for (let i = 0; i < bufSize; i++) {
          const white = Math.random() * 2 - 1;
          b0 = 0.99886 * b0 + white * 0.0555179;
          b1 = 0.99332 * b1 + white * 0.0750759;
          b2 = 0.96900 * b2 + white * 0.1538520;
          b3 = 0.86650 * b3 + white * 0.3104856;
          b4 = 0.55000 * b4 + white * 0.5329522;
          b5 = -0.7616 * b5 - white * 0.0168980;
          data[i] = (b0+b1+b2+b3+b4+b5+b6 + white * 0.5362) / 7.0;
          b6 = white * 0.115926;
        }
        return buffer;
      }

      function startAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // 1) Low drone — 40Hz presence
        const drone = audioCtx.createOscillator();
        drone.type = 'sine';
        drone.frequency.value = 40;
        const droneGain = audioCtx.createGain();
        droneGain.gain.value = 0.04;
        drone.connect(droneGain);
        droneGain.connect(audioCtx.destination);
        drone.start();

        // 2) Pink noise filtered ambient
        const pinkBuf = createPinkNoise(audioCtx);
        const pinkSrc = audioCtx.createBufferSource();
        pinkSrc.buffer = pinkBuf;
        pinkSrc.loop = true;
        const lpf = audioCtx.createBiquadFilter();
        lpf.type = 'lowpass';
        lpf.frequency.value = 800;
        const pinkGain = audioCtx.createGain();
        pinkGain.gain.value = 0.018;
        pinkSrc.connect(lpf);
        lpf.connect(pinkGain);
        pinkGain.connect(audioCtx.destination);
        pinkSrc.start();

        // 3) Crystal tone 432Hz with LFO vibrato
        const crystal = audioCtx.createOscillator();
        crystal.type = 'sine';
        crystal.frequency.value = 432;
        const lfo = audioCtx.createOscillator();
        lfo.type = 'sine';
        lfo.frequency.value = 0.08;
        const lfoGain = audioCtx.createGain();
        lfoGain.gain.value = 3; // ±3Hz vibrato
        lfo.connect(lfoGain);
        lfoGain.connect(crystal.frequency);
        const crystalGain = audioCtx.createGain();
        crystalGain.gain.value = 0.012;
        crystal.connect(crystalGain);
        crystalGain.connect(audioCtx.destination);
        crystal.start();
        lfo.start();

        nodes = [drone, pinkSrc, crystal, lfo];
      }

      function stopAudio() {
        if (!audioCtx) return;
        nodes.forEach(n => { try { n.stop(); } catch(e) {} });
        audioCtx.close();
        audioCtx = null;
        nodes = [];
      }

      btn.addEventListener('click', function() {
        active = !active;
        if (active) {
          startAudio();
          btn.classList.add('active');
        } else {
          stopAudio();
          btn.classList.remove('active');
        }
      });
    })();

    /* ══════════════════════════════════════════════════════════════
       EFFECT 8 — HORA E FASE LUNAR
       ══════════════════════════════════════════════════════════════ */
    (function() {
      const timeEl = document.getElementById('lunarTime');
      if (!timeEl) return;

      // Lunar phase calculation
      // Known new moon: 2000-01-06T18:14:00Z (Julian Date ~2451549.5)
      function getLunarPhase(date) {
        const knownNewMoon = new Date('2000-01-06T18:14:00Z');
        const msPerDay = 86400000;
        const synodicPeriod = 29.53058867;
        const daysSince = (date - knownNewMoon) / msPerDay;
        let phase = ((daysSince % synodicPeriod) + synodicPeriod) % synodicPeriod;
        // 0 = new moon, ~14.75 = full moon
        return phase;
      }

      // Draw moon into the container SVG element
      function renderMoon(phase) {
        const container = document.getElementById('lunarIcon');
        if (!container) return;
        const p = phase / 29.53058867;
        const sector = Math.round(p * 8) % 8;
        const r = 5, cx = 7, cy = 7;
        const gold = 'rgba(201,162,74,0.5)';
        const dark = 'rgba(20,12,35,0.95)';
        const outline = 'rgba(201,162,74,0.3)';

        container.innerHTML = '';
        container.setAttribute('viewBox', '0 0 14 14');
        container.setAttribute('width', '14');
        container.setAttribute('height', '14');

        function addEl(tag, attrs) {
          const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
          Object.keys(attrs).forEach(k => el.setAttribute(k, attrs[k]));
          container.appendChild(el);
        }

        // base circle
        addEl('circle', { cx, cy, r, fill: sector >= 4 ? gold : dark, stroke: outline, 'stroke-width': '0.5' });

        if (sector === 0 || sector === 4) {
          // new or full — just the base circle
        } else if (sector === 2) {
          // first quarter — right half lit
          addEl('path', { d: `M${cx},${cy-r} A${r},${r} 0 0,1 ${cx},${cy+r} Z`, fill: gold });
        } else if (sector === 6) {
          // last quarter — left half lit
          addEl('path', { d: `M${cx},${cy-r} A${r},${r} 0 0,0 ${cx},${cy+r} Z`, fill: gold });
        } else if (sector === 1) {
          // waxing crescent
          addEl('circle', { cx, cy, r, fill: dark, stroke: outline, 'stroke-width': '0.5' });
          addEl('path', { d: `M${cx},${cy-r} A${r*0.3},${r} 0 0,1 ${cx},${cy+r} A${r},${r} 0 0,1 ${cx},${cy-r} Z`, fill: gold });
        } else if (sector === 3) {
          // waxing gibbous
          addEl('path', { d: `M${cx},${cy-r} A${r*0.3},${r} 0 0,0 ${cx},${cy+r} A${r},${r} 0 0,1 ${cx},${cy-r} Z`, fill: dark });
        } else if (sector === 5) {
          // waning gibbous
          addEl('path', { d: `M${cx},${cy-r} A${r*0.3},${r} 0 0,1 ${cx},${cy+r} A${r},${r} 0 0,0 ${cx},${cy-r} Z`, fill: dark });
        } else if (sector === 7) {
          // waning crescent
          addEl('circle', { cx, cy, r, fill: dark, stroke: outline, 'stroke-width': '0.5' });
          addEl('path', { d: `M${cx},${cy-r} A${r*0.3},${r} 0 0,0 ${cx},${cy+r} A${r},${r} 0 0,0 ${cx},${cy-r} Z`, fill: gold });
        }
      }

      function updateClock() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        timeEl.textContent = h + ':' + m;
        renderMoon(getLunarPhase(now));
      }

      updateClock();
      setInterval(updateClock, 1000);
    })();

    /* ── MENU MOBILE ── */
    (function() {
      const trigger = document.getElementById('menuTrigger');
      const overlay = document.getElementById('menuOverlay');
      if (!trigger || !overlay) return;
      const items = overlay.querySelectorAll('.menu-nav-item');

      function open()  { trigger.classList.add('open'); overlay.classList.add('open'); trigger.setAttribute('aria-expanded','true');  document.body.style.overflow='hidden'; }
      function close() { trigger.classList.remove('open'); overlay.classList.remove('open'); trigger.setAttribute('aria-expanded','false'); document.body.style.overflow=''; }

      trigger.addEventListener('click', () => overlay.classList.contains('open') ? close() : open());
      document.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });

      // Close button inside the menu panel
      const closeBtn = document.getElementById('menuClose');
      if (closeBtn) closeBtn.addEventListener('click', close);

      items.forEach(item => {
        item.addEventListener('click', e => {
          const href = item.getAttribute('href');
          if (!href || href === '#') e.preventDefault();
          items.forEach(i => i.classList.remove('active'));
          item.classList.add('active');
          setTimeout(close, 320);
        });
      });
    })();

    /* ══════════════════════════════════════════════════════════════
       Show audio + lunar clock with nav (effect 7 & 8 visibility)
       ══════════════════════════════════════════════════════════════ */
    setTimeout(function() {
      const audioToggle = document.getElementById('audioToggle');
      const lunarClock  = document.getElementById('lunarClock');
      if (audioToggle) audioToggle.classList.add('show');
      if (lunarClock)  lunarClock.classList.add('show');
    }, 6200);

    </script>
  </body>
