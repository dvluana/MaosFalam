<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MãosFalam</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Raleway:wght@200;300;400;500&family=JetBrains+Mono:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --black: #000000;
        --gold: #c9a24a;
        --gold-light: #d9b86a;
        --gold-dim: #7a6832;
        --bone: #e8dfd0;
        --bone-dim: #9b9284;
        --violet: #8b7bbf;
        --velvet: #2a1840;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: "Raleway", sans-serif;
        background: #000;
        color: var(--bone);
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
        overflow-y: hidden;
      }
      body.loaded { overflow-y: auto; }

      /* ═══════════════════════════════════════════════════════════
         STAGE SEAL — black cover, lifted when lamp illuminates
         ═══════════════════════════════════════════════════════════ */
      .stage-dark {
        position: fixed; inset: 0; z-index: 15;
        background: #000;
        pointer-events: none;
        /* no transition by default — set by JS when clearing */
      }

      /* ═══════════════════════════════════════════════════════════
         CEILING LAMP SYSTEM
         Fixture: z:17   (always on top)
         Cone:    z:16   (above stage-dark so it glows through darkness)
         Ambient: z:16
         Stage:   z:15   (seals hero, reveals when lamp illuminates)
         ═══════════════════════════════════════════════════════════ */

      /* ── FIXTURE: canopy + cord + socket + shade + bulb ── */
      .lamp-wrap {
        position: fixed;
        top: 0; left: 50%; transform: translateX(-50%);
        z-index: 30;
        pointer-events: none;
        display: flex; flex-direction: column; align-items: center;
        opacity: 0;
      }
      .lamp-wrap.on { animation: fixtureReveal 1.8s ease forwards; }
      @keyframes fixtureReveal {
        0%   { opacity: 0; }
        100% { opacity: 1; }
      }

      /* Canopla — disco de latão no teto */
      .lamp-canopy {
        width: 28px; height: 9px; border-radius: 50%;
        background: linear-gradient(180deg,
          #6b4f18 0%, #9a7228 35%, #b8922e 55%, #7a5820 80%, #4a3510 100%);
        box-shadow:
          0 1px 0 rgba(201,162,74,0.4),
          0 2px 8px rgba(0,0,0,0.8),
          inset 0 -1px 2px rgba(0,0,0,0.5);
        position: relative;
      }
      .lamp-canopy::after {
        content: '';
        position: absolute;
        top: 2px; left: 20%; right: 20%; height: 2px;
        background: linear-gradient(90deg, transparent, rgba(220,180,80,0.5), transparent);
        border-radius: 50%;
      }

      /* Fio trançado — mais grosso e com textura */
      .lamp-cord {
        width: 3px; height: 64px;
        background: repeating-linear-gradient(
          180deg,
          #3a2808 0px, #6b4a18 3px, #3a2808 6px
        );
        box-shadow: 1px 0 0 rgba(0,0,0,0.6), -1px 0 0 rgba(0,0,0,0.4);
      }

      /* Bocal/socket — cilindro de latão */
      .lamp-socket {
        width: 16px; height: 20px;
        background: linear-gradient(180deg,
          #7a5820 0%, #a87c2a 20%, #c49835 40%,
          #8a6422 60%, #5c4018 80%, #3a2808 100%);
        border-radius: 2px 2px 1px 1px;
        box-shadow:
          inset -2px 0 4px rgba(0,0,0,0.5),
          inset 1px 0 3px rgba(220,175,70,0.15),
          0 1px 0 rgba(201,162,74,0.3);
        position: relative;
      }
      /* Anel decorativo no bocal */
      .lamp-socket::before {
        content: '';
        position: absolute;
        top: 4px; left: 0; right: 0; height: 2px;
        background: linear-gradient(90deg,
          #4a3010, #c49835 30%, #e8c060 50%, #c49835 70%, #4a3010);
      }
      .lamp-socket::after {
        content: '';
        position: absolute;
        bottom: 0; left: 0; right: 0; height: 3px;
        background: linear-gradient(90deg,
          #3a2808, #9a7228 30%, #b89035 50%, #9a7228 70%, #3a2808);
      }

      /* Cúpula — latão envelhecido com costelas */
      .lamp-shade {
        width: 88px; height: 50px;
        position: relative;
        background: linear-gradient(175deg,
          #2a1e08 0%,
          #4a3410 18%,
          #6b4e1a 32%,
          #8a6828 45%,
          #7a5a20 58%,
          #5a4018 72%,
          #3a2808 85%,
          #1e1404 100%);
        clip-path: polygon(10% 0%, 90% 0%, 100% 100%, 0% 100%);
        overflow: hidden;
        box-shadow:
          inset 0 2px 6px rgba(0,0,0,0.7),
          inset 0 -1px 0 rgba(201,162,74,0.1);
      }
      /* Costelas — efeito de metal prensado */
      .lamp-shade::before {
        content: '';
        position: absolute; inset: 0;
        background:
          repeating-linear-gradient(90deg,
            transparent 0px,
            transparent 8px,
            rgba(0,0,0,0.18) 8px,
            rgba(0,0,0,0.18) 9px,
            rgba(201,162,74,0.06) 9px,
            rgba(201,162,74,0.06) 10px,
            transparent 10px
          ),
          linear-gradient(175deg,
            transparent 20%,
            rgba(218,175,65,0.12) 55%,
            rgba(218,175,65,0.22) 80%,
            rgba(255,210,90,0.10) 100%);
      }
      /* Aro inferior duplo */
      .lamp-shade::after {
        content: '';
        position: absolute;
        bottom: 0; left: 0; right: 0; height: 5px;
        background: linear-gradient(180deg,
          rgba(201,162,74,0.0) 0%,
          rgba(201,162,74,0.5) 40%,
          rgba(228,192,88,0.9) 60%,
          rgba(160,125,50,0.7) 80%,
          rgba(100,75,25,0.5) 100%);
      }

      /* Bulbo Edison — mais visível */
      .lamp-bulb {
        position: absolute;
        bottom: 8px; left: 50%; transform: translateX(-50%);
        width: 14px; height: 18px; border-radius: 50% 50% 40% 40%;
        background: radial-gradient(ellipse at 38% 30%,
          #fffef5 0%, #fde98a 22%, #f5c040 50%, #c88c18 78%, #7a5008 100%);
        opacity: 0;
      }
      .lamp-bulb.ignite {
        animation: bulbWarmUp 3.2s ease forwards;
      }
      @keyframes bulbWarmUp {
        0%   { opacity: 0;    box-shadow: none; filter: brightness(0.2); }
        8%   { opacity: 0.45; box-shadow: 0 0 4px rgba(255,140,20,0.55), 0 0 12px rgba(220,140,30,0.35); filter: brightness(0.5); }
        14%  { opacity: 0.15; box-shadow: 0 0 2px rgba(255,100,20,0.25); filter: brightness(0.25); }
        22%  { opacity: 0.85; box-shadow: 0 0 8px rgba(255,200,60,0.80), 0 0 22px rgba(220,175,55,0.60); filter: brightness(0.9); }
        30%  { opacity: 0.60; box-shadow: 0 0 5px rgba(255,170,40,0.55); filter: brightness(0.7); }
        42%  { opacity: 1;    box-shadow: 0 0 7px rgba(255,225,85,1), 0 0 20px rgba(218,185,80,0.88), 0 0 55px rgba(200,158,48,0.58); filter: brightness(1); }
        58%  { opacity: 0.90; filter: brightness(0.96); }
        72%  { opacity: 1;    filter: brightness(1.02); }
        100% { opacity: 1;    box-shadow: 0 0 6px rgba(255,220,80,1), 0 0 18px rgba(218,185,80,0.9), 0 0 45px rgba(210,165,50,0.68), 0 0 100px rgba(195,155,44,0.40); filter: brightness(1); }
      }
      /* Steady post-ignition flicker (applied via class after warmup) */
      .lamp-bulb.steady {
        animation: bulbFlicker 12s ease-in-out 3.2s infinite;
        opacity: 1;
        box-shadow: 0 0 6px rgba(255,220,80,1), 0 0 18px rgba(218,185,80,0.9), 0 0 45px rgba(210,165,50,0.68), 0 0 100px rgba(195,155,44,0.40);
      }
      @keyframes bulbFlicker {
        0%,88%,100% { opacity: 1; filter: brightness(1); }
        90%  { opacity: 0.80; filter: brightness(0.86); }
        91%  { opacity: 1;    filter: brightness(1.04); }
        94%  { opacity: 0.88; filter: brightness(0.92); }
        95%  { opacity: 1; }
      }

      /* Ceiling halo — warm glow where cord meets ceiling */
      .lamp-halo {
        position: fixed;
        top: 0; left: 50%; transform: translateX(-50%);
        width: 200px; height: 12px;
        z-index: 17;
        pointer-events: none;
        background: radial-gradient(ellipse 100% 100% at 50% 0%,
          rgba(218,185,80,0.28) 0%, transparent 100%);
        opacity: 0;
      }
      .lamp-halo.on {
        animation: haloIn 2.6s ease 0.8s forwards;
      }
      @keyframes haloIn {
        to { opacity: 1; }
      }

      /* ── LIGHT CONE — soft atmospheric, no hard edges ── */
      /* No clip-path. Multiple soft radial gradients that
         dissipate naturally well before the video area. */
      /* Light falls only near ceiling — gone long before video */
      .lamp-cone {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: 28vh;
        z-index: 16;
        pointer-events: none;
        background:
          radial-gradient(ellipse 32% 100% at 50% 0%,
            rgba(228,192,75,0.14) 0%,
            rgba(212,172,62,0.05) 50%,
            transparent 100%),
          radial-gradient(ellipse 70% 55% at 50% 0%,
            rgba(201,162,54,0.05) 0%,
            transparent 100%);
        opacity: 0;
        /* mask bottom edge so it fades to nothing, not cuts */
        -webkit-mask-image: linear-gradient(180deg, black 0%, black 40%, transparent 100%);
        mask-image: linear-gradient(180deg, black 0%, black 40%, transparent 100%);
      }
      .lamp-cone.on { animation: coneIgnite 3s ease forwards; }
      @keyframes coneIgnite {
        0%   { opacity: 0; }
        12%  { opacity: 0.35; }
        18%  { opacity: 0.10; }
        28%  { opacity: 0.60; }
        36%  { opacity: 0.38; }
        52%  { opacity: 0.70; }
        100% { opacity: 0.75; }
      }

      .lamp-ambient { display: none; }

      /* ══════════════════════════════════════════════════════════
         SMOKE — atmospheric mist that breaks the solid black
         Sits below vignette (z:12), above hero background
         ══════════════════════════════════════════════════════════ */
      /* fumaça: névoa clara se movendo contra o fundo escuro */
      .smoke {
        position: fixed; inset: 0; z-index: 16;
        pointer-events: none; overflow: hidden;
      }
      .smoke-orb {
        position: absolute; border-radius: 50%;
        will-change: transform, opacity;
      }
      /* wisp principal — sobe lentamente do centro-baixo */
      .smoke-orb:nth-child(1) {
        width: 320px; height: 520px;
        bottom: -80px; left: 50%; margin-left: -160px;
        background: radial-gradient(ellipse 50% 60% at 50% 70%,
          rgba(210,200,230,0.07) 0%,
          rgba(180,170,210,0.04) 45%,
          transparent 80%);
        filter: blur(18px);
        animation: wispRise 18s ease-in-out infinite;
      }
      /* wisp esquerdo */
      .smoke-orb:nth-child(2) {
        width: 220px; height: 380px;
        bottom: -40px; left: 10%;
        background: radial-gradient(ellipse 50% 60% at 50% 70%,
          rgba(210,200,230,0.055) 0%,
          transparent 75%);
        filter: blur(16px);
        animation: wispRise 24s ease-in-out 3s infinite;
      }
      /* wisp direito */
      .smoke-orb:nth-child(3) {
        width: 240px; height: 360px;
        bottom: -30px; right: 8%;
        background: radial-gradient(ellipse 50% 60% at 50% 70%,
          rgba(210,200,230,0.05) 0%,
          transparent 75%);
        filter: blur(16px);
        animation: wispRise 20s ease-in-out 7s infinite;
      }
      /* pool raso no chão — névoa rasteira */
      .smoke-orb:nth-child(4) {
        width: 100%; height: 200px;
        bottom: 0; left: 0;
        border-radius: 0;
        background: linear-gradient(0deg,
          rgba(180,165,215,0.06) 0%,
          transparent 100%);
        filter: blur(12px);
        animation: groundFog 12s ease-in-out infinite;
      }
      /* wisp alto fino */
      .smoke-orb:nth-child(5) {
        width: 140px; height: 300px;
        bottom: 20%; left: 38%;
        background: radial-gradient(ellipse 40% 55% at 50% 80%,
          rgba(210,200,230,0.045) 0%,
          transparent 75%);
        filter: blur(14px);
        animation: wispRise 28s ease-in-out 11s infinite;
      }

      @keyframes wispRise {
        0%   { transform: translateY(0) translateX(0) scaleX(1);     opacity: 0;   }
        8%   { opacity: 1; }
        50%  { transform: translateY(-180px) translateX(12px) scaleX(1.15); opacity: 0.85; }
        85%  { transform: translateY(-320px) translateX(-8px) scaleX(0.9);  opacity: 0.3;  }
        100% { transform: translateY(-400px) translateX(4px) scaleX(0.7);   opacity: 0;    }
      }
      @keyframes groundFog {
        0%,100% { opacity: 0.7; transform: scaleX(1); }
        50%     { opacity: 1;   transform: scaleX(1.04); }
      }

      /* ── SCENE VIGNETTE (permanent) ── */
      .scene-vignette {
        position: fixed; inset: 0; z-index: 13;
        pointer-events: none;
        background: radial-gradient(
          ellipse 70% 62% at 50% 38%,
          transparent 18%,
          rgba(6,4,10,0.32) 46%,
          rgba(0,0,0,0.75) 72%,
          rgba(0,0,0,0.96) 90%
        );
        opacity: 0;
        transition: opacity 2.6s ease 0.4s;
      }
      .scene-vignette.show { opacity: 1; }

      /* ═══════════════════════════════════════════════
         PRELOADER — curtains only, transparent bg
         ═══════════════════════════════════════════════ */
      .preloader {
        position: fixed; inset: 0; z-index: 200;
        background: transparent;
        pointer-events: all;
      }
      .curtain-left, .curtain-right {
        position: absolute; top: 0; bottom: 0; width: 54%;
        z-index: 207; overflow: hidden;
      }
      .curtain-left  { left: 0; }
      .curtain-right { right: 0; }
      .curtain-canvas { width: 100%; height: 100%; display: block; background: #000; }
      /* Old woven fabric texture over curtain canvas */
      .curtain-left::after, .curtain-right::after {
        content: ''; position: absolute; inset: 0; z-index: 1; pointer-events: none;
        background-image:
          repeating-linear-gradient(0deg,   transparent, transparent 2px, rgba(255,255,255,0.016) 2px, rgba(255,255,255,0.016) 3px),
          repeating-linear-gradient(90deg,  transparent, transparent 4px, rgba(0,0,0,0.05) 4px, rgba(0,0,0,0.05) 5px);
        mix-blend-mode: overlay;
      }
      .preloader.fade {
        opacity: 0; pointer-events: none;
        transition: opacity 0.9s ease;
      }

      /* ═══════════════════════════════════
         NAV
         ═══════════════════════════════════ */
      .nav {
        position: fixed; top: 0; left: 0; right: 0; z-index: 50;
        background: linear-gradient(180deg, rgba(0,0,0,0.72), transparent);
        opacity: 0; transition: opacity 0.6s ease;
      }
      .nav.show { opacity: 1; }
      /* inner column — constrained to mobile width, centered */
      .nav-inner {
        max-width: 430px;
        margin: 0 auto;
        display: flex; justify-content: space-between; align-items: center;
        padding: 16px 20px;
      }
      .nav-logo svg { filter: drop-shadow(0 0 10px rgba(201,162,74,0.10)); }
      /* ── MENU TRIGGER ── */
      .menu-trigger {
        width: 36px; height: 36px;
        border: 1px solid rgba(201,162,74,0.12);
        background: rgba(0,0,0,0.5);
        backdrop-filter: blur(8px);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 5px; cursor: pointer;
        border-radius: 0 5px 0 5px;
        position: relative;
        transition: border-color 0.3s;
      }
      .menu-trigger::before, .menu-trigger::after {
        content: ''; position: absolute;
        width: 7px; height: 7px;
        border-style: solid; border-color: rgba(201,162,74,0.3);
        transition: all 0.3s;
      }
      .menu-trigger::before { top:-1px; left:-1px; border-width:1px 0 0 1px; }
      .menu-trigger::after  { bottom:-1px; right:-1px; border-width:0 1px 1px 0; }
      .menu-trigger:hover { border-color: rgba(201,162,74,0.28); }
      .burger-line {
        display: block; height: 1px; background: var(--gold-dim);
        transition: all 0.4s cubic-bezier(0.23,1,0.32,1);
      }
      .burger-line:nth-child(1) { width: 16px; }
      .burger-line:nth-child(2) { width: 11px; }
      .burger-line:nth-child(3) { width: 6px; }
      .menu-trigger.open .burger-line:nth-child(1) { width:14px; transform:translateY(6px) rotate(45deg); background:var(--gold); }
      .menu-trigger.open .burger-line:nth-child(2) { opacity:0; transform:scaleX(0); }
      .menu-trigger.open .burger-line:nth-child(3) { width:14px; transform:translateY(-6px) rotate(-45deg); background:var(--gold); }

      /* ── MENU OVERLAY ── */
      .menu-overlay {
        position: fixed; inset: 0; z-index: 200;
        pointer-events: none;
      }
      .menu-panel {
        position: absolute; inset: 0;
        background: #000;
        transform: translateY(-100%);
        transition: transform 0.72s cubic-bezier(0.86,0,0.07,1);
        overflow: hidden;
      }
      .menu-panel::after {
        content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 0;
        opacity: 0.035;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      }
      .menu-overlay.open { pointer-events: all; }
      .menu-overlay.open .menu-panel { transform: translateY(0); }
      .menu-glow {
        position: absolute; width: 340px; height: 340px;
        left: 50%; top: 50%; transform: translate(-50%,-50%);
        border-radius: 50%;
        background: radial-gradient(ellipse at center, rgba(201,162,74,0.055) 0%, rgba(123,107,165,0.04) 40%, transparent 70%);
        filter: blur(40px); pointer-events: none; z-index: 1;
        opacity: 0; transition: opacity 0.8s ease 0.4s;
      }
      .menu-overlay.open .menu-glow { opacity: 1; }
      .menu-sweep {
        position: absolute; top: 50%; left: -10%; right: -10%; height: 1px;
        background: linear-gradient(90deg, transparent, rgba(201,162,74,0.18) 20%, rgba(201,162,74,0.35) 50%, rgba(201,162,74,0.18) 80%, transparent);
        transform: scaleX(0); transform-origin: left center;
        z-index: 2; pointer-events: none;
      }
      .menu-overlay.open .menu-sweep { animation: menuSweep 0.55s cubic-bezier(0.4,0,0.2,1) 0.38s forwards; }
      @keyframes menuSweep {
        0%  { transform: scaleX(0); opacity: 1; }
        70% { transform: scaleX(1); opacity: 1; }
        100%{ transform: scaleX(1); opacity: 0; }
      }
      .menu-inner {
        position: relative; z-index: 3;
        height: 100%; display: flex; flex-direction: column;
        padding: 88px 28px 48px;
        justify-content: space-between;
      }
      .menu-brand {
        display: flex; align-items: center; gap: 12px;
        opacity: 0; transform: translateY(10px);
        transition: opacity 0.5s ease, transform 0.5s ease;
      }
      .menu-overlay.open .menu-brand { opacity:1; transform:translateY(0); transition-delay:0.55s; }
      .menu-brand-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 8px; letter-spacing: 5px; text-transform: uppercase;
        color: var(--gold-dim);
      }
      .menu-nav { display: flex; flex-direction: column; gap: 0; margin-top: -16px; }
      .menu-nav-item {
        display: block; position: relative;
        padding: 20px 0;
        border-bottom: 1px solid rgba(201,162,74,0.05);
        cursor: pointer; text-decoration: none;
        overflow: hidden;
        opacity: 0; transform: translateX(-20px);
        transition: opacity 0.45s ease, transform 0.45s cubic-bezier(0.23,1,0.32,1);
      }
      .menu-nav-item:first-child { border-top: 1px solid rgba(201,162,74,0.05); }
      .menu-overlay.open .menu-nav-item:nth-child(1) { opacity:1; transform:none; transition-delay:0.48s; }
      .menu-overlay.open .menu-nav-item:nth-child(2) { opacity:1; transform:none; transition-delay:0.56s; }
      .menu-overlay.open .menu-nav-item:nth-child(3) { opacity:1; transform:none; transition-delay:0.64s; }
      .menu-overlay.open .menu-nav-item:nth-child(4) { opacity:1; transform:none; transition-delay:0.72s; }
      .menu-nav-item::before {
        content: ''; position: absolute; inset: 0;
        background: linear-gradient(90deg, rgba(201,162,74,0.04) 0%, transparent 60%);
        transform: translateX(-100%); transition: transform 0.4s cubic-bezier(0.23,1,0.32,1);
      }
      .menu-nav-item:hover::before { transform: translateX(0); }
      .menu-nav-item.active::after {
        content: ''; position: absolute; left:0; top:0; bottom:0; width:2px;
        background: linear-gradient(180deg, transparent, var(--gold), transparent);
        box-shadow: 0 0 12px rgba(201,162,74,0.5);
      }
      .menu-nav-item .corner-tl, .menu-nav-item .corner-br {
        position: absolute; width:8px; height:8px;
        border-style: solid; border-color: rgba(201,162,74,0.35);
        opacity: 0; transition: opacity 0.3s;
      }
      .menu-nav-item .corner-tl { top:8px; left:8px; border-width:1px 0 0 1px; }
      .menu-nav-item .corner-br { bottom:8px; right:8px; border-width:0 1px 1px 0; }
      .menu-nav-item.active .corner-tl,
      .menu-nav-item.active .corner-br { opacity: 1; }
      .item-inner { display: flex; align-items: baseline; gap: 16px; padding-left: 16px; }
      .item-num {
        font-family: "JetBrains Mono", monospace;
        font-size: 8px; letter-spacing: 3px; color: var(--gold-dim);
        flex-shrink: 0; transition: color 0.3s;
      }
      .menu-nav-item.active .item-num,
      .menu-nav-item:hover .item-num { color: var(--gold); }
      .item-label {
        font-family: "Cinzel", serif;
        font-size: clamp(20px, 6.5vw, 28px);
        font-weight: 400; letter-spacing: 0.04em;
        color: var(--bone-dim); transition: color 0.3s, text-shadow 0.3s; line-height: 1;
      }
      .menu-nav-item.active .item-label { color: var(--bone); }
      .menu-nav-item:hover .item-label { color: var(--bone); text-shadow: 0 0 28px rgba(201,162,74,0.18); }
      .item-sub {
        font-family: "Cormorant Garamond", serif;
        font-size: 11px; font-style: italic; font-weight: 300;
        color: var(--gold-dim); margin-top: 3px; padding-left: 40px;
        letter-spacing: 0.03em;
        opacity: 0; max-height: 0; overflow: hidden;
        transition: opacity 0.3s, max-height 0.3s;
      }
      .menu-nav-item.active .item-sub { opacity: 1; max-height: 20px; }
      .menu-footer {
        display: flex; flex-direction: column; gap: 14px;
        opacity: 0; transform: translateY(10px);
        transition: opacity 0.5s ease, transform 0.5s ease;
      }
      .menu-overlay.open .menu-footer { opacity:1; transform:translateY(0); transition-delay:0.82s; }
      .menu-orn { display: flex; align-items: center; gap: 12px; }
      .menu-orn::before, .menu-orn::after {
        content: ''; flex: 1; height: 1px;
        background: linear-gradient(90deg, transparent, rgba(201,162,74,0.12), transparent);
      }
      .menu-orn-d { width:4px; height:4px; background:var(--gold-dim); transform:rotate(45deg); flex-shrink:0; }
      .menu-tagline {
        font-family: "Cormorant Garamond", serif;
        font-size: 13px; font-style: italic; font-weight: 300;
        color: var(--bone-dim); text-align: center; letter-spacing: 0.04em; opacity: 0.7;
      }
      .menu-version {
        font-family: "JetBrains Mono", monospace;
        font-size: 7px; letter-spacing: 3px; text-transform: uppercase;
        color: rgba(201,162,74,0.22); text-align: center;
      }

      /* ═══════════════════════════════════
         HERO
         ═══════════════════════════════════ */
      .hero {
        min-height: 100vh;
        display: flex; flex-direction: column;
        align-items: center; justify-content: flex-end;
        position: relative; padding: 0 0 8vh;
        overflow: hidden;
        z-index: 25;
      }
      .hero::before {
        content: ""; position: absolute; inset: 0; pointer-events: none;
        background:
          radial-gradient(ellipse 100% 200px at 50% 100%, rgba(0,0,0,0.9) 0%, transparent 70%);
      }

      /* ── MANDALA ── */
      .hero-mandala {
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -52%);
        width: min(520px, 90vw); height: min(520px, 90vw);
        pointer-events: none; z-index: 1;
        animation: mandalaSpin 180s linear infinite; opacity: 0.65;
      }
      @keyframes mandalaSpin {
        from { transform: translate(-50%,-52%) rotate(0deg); }
        to   { transform: translate(-50%,-52%) rotate(360deg); }
      }

      .hero-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 8px; letter-spacing: 5px; text-transform: uppercase;
        color: var(--gold-dim); opacity: 0.7;
        margin-bottom: 20px; position: relative; z-index: 3;
      }

      /* ── DIORAMA ── */
      .diorama-wrap {
        position: relative; z-index: 2;
        width: min(400px, 82vw); margin-bottom: 8px;
      }
      .diorama-void {
        position: absolute; bottom: -8px; left: 50%;
        transform: translateX(-50%);
        width: 78%; height: 55px;
        background: radial-gradient(ellipse 100% 100% at 50% 50%, rgba(201,162,74,0.12) 0%, transparent 70%);
        filter: blur(22px); pointer-events: none; z-index: 0;
      }
      .diorama-glow {
        position: absolute; top: 5%; left: 50%;
        transform: translateX(-50%);
        width: 80%; height: 80%; border-radius: 50%;
        background: radial-gradient(ellipse 80% 80% at 50% 50%,
          rgba(201,162,74,0.06) 0%, transparent 80%);
        filter: blur(30px);
        animation: glowPulse 6s ease-in-out infinite;
        pointer-events: none; z-index: 0;
      }
      @keyframes glowPulse {
        0%,100% { opacity:0.48; transform:translateX(-50%) scale(1); }
        50%      { opacity:0.85; transform:translateX(-50%) scale(1.08); }
      }
      .diorama-frame { display: none; }
      .diorama-star {
        position: absolute; border-radius: 50%;
        pointer-events: none; opacity: 0; z-index: 4;
      }
      .diorama-star:nth-child(3){ width:2px;   height:2px;   background:var(--gold);   top:10%; left:3%;  animation:starFloat 4s   ease-in-out 0s   infinite alternate; }
      .diorama-star:nth-child(4){ width:2px;   height:2px;   background:var(--gold);   top:26%; right:2%; animation:starFloat 5.2s ease-in-out 0.9s infinite alternate; }
      .diorama-star:nth-child(5){ width:2px;   height:2px;   background:var(--gold);   top:70%; left:5%;  animation:starFloat 3.8s ease-in-out 1.6s infinite alternate; }
      .diorama-star:nth-child(6){ width:2px;   height:2px;   background:var(--gold);   top:80%; right:4%; animation:starFloat 4.6s ease-in-out 0.4s infinite alternate; }
      .diorama-star:nth-child(7){ width:1.5px; height:1.5px; background:var(--violet); top:44%; left:1%;  animation:starFloat 6s   ease-in-out 2s   infinite alternate; }
      .diorama-star:nth-child(8){ width:1.5px; height:1.5px; background:var(--violet); top:56%; right:1%; animation:starFloat 5.5s ease-in-out 2.5s infinite alternate; }
      @keyframes starFloat {
        0%   { opacity:0;    transform:translateY(5px)  scale(0.7); }
        40%  { opacity:0.65; }
        100% { opacity:0.10; transform:translateY(-7px) scale(1.3); }
      }
      .diorama-stage {
        position: absolute; bottom: -32px; left: 50%;
        transform: translateX(-50%);
        width: 55%; height: 1px;
        background: linear-gradient(90deg, transparent, rgba(201,162,74,0.22), transparent);
        pointer-events: none; z-index: 4;
      }
      .diorama-stage::after {
        content: ''; position: absolute; top: 8px; left: 18%;
        width: 64%; height: 1px;
        background: linear-gradient(90deg, transparent, rgba(139,123,191,0.14), transparent);
      }
      .diorama-img {
        width: 100%; display: block;
        position: relative; z-index: 2;
        filter:
          drop-shadow(0 30px 50px rgba(0,0,0,0.95))
          drop-shadow(0 0 30px rgba(0,0,0,0.6));
      }

      /* ── CTA — brand system button ── */
      .hero-content {
        position: relative; z-index: 3; text-align: center;
        width: 100%; max-width: 430px; padding: 0 20px;
        margin-top: -32px;
      }
      .cta-btn {
        display: flex; align-items: center; justify-content: center;
        width: 100%; padding: 18px 24px;
        background: linear-gradient(160deg, #1e1838, #2a2150, #1e1838);
        color: var(--bone);
        font-family: "Raleway", sans-serif;
        font-size: 10px; font-weight: 400;
        letter-spacing: 0.08em; text-transform: uppercase;
        border: none; border-radius: 0 6px 0 6px;
        cursor: pointer; position: relative; overflow: visible;
        box-shadow:
          0 0 0 1px rgba(201,162,74,0.10),
          0 0 28px rgba(123,107,165,0.14),
          0 0 56px rgba(123,107,165,0.05);
        transition: transform 0.5s cubic-bezier(0.23,1,0.32,1);
        animation: btnCrystal 7s ease-in-out infinite;
      }
      .cta-btn::before, .cta-btn::after {
        content: ""; position: absolute;
        width: 9px; height: 9px;
        border-color: rgba(201,162,74,0.28); border-style: solid;
        transition: all 0.5s;
      }
      .cta-btn::before { top:-1px; left:-1px; border-width:1px 0 0 1px; }
      .cta-btn::after  { bottom:-1px; right:-1px; border-width:0 1px 1px 0; }
      .cta-btn:hover {
        transform: translateY(-2px);
        box-shadow:
          0 0 0 1px rgba(218,185,80,0.45),
          0 0 20px rgba(218,185,80,0.28),
          0 0 50px rgba(175,155,235,0.36),
          0 0 100px rgba(130,105,210,0.20),
          inset 0 0 30px rgba(160,140,220,0.10);
        animation-play-state: paused;
      }
      .cta-btn:hover::before, .cta-btn:hover::after {
        width: 14px; height: 14px;
        border-color: rgba(201,162,74,0.45);
      }

      /* ── CRYSTAL ORB GLOW — neon tarot breathing ── */
      @keyframes btnCrystal {
        0%, 100% {
          box-shadow:
            0 0 0 1px rgba(201,162,74,0.18),
            0 0 10px rgba(201,162,74,0.10),
            0 0 28px rgba(139,123,191,0.14),
            0 0 55px rgba(100,80,180,0.06),
            inset 0 0 20px rgba(139,123,191,0.03);
        }
        40% {
          box-shadow:
            0 0 0 1px rgba(218,185,80,0.38),
            0 0 18px rgba(218,185,80,0.22),
            0 0 48px rgba(175,155,235,0.30),
            0 0 90px rgba(130,105,210,0.16),
            inset 0 0 30px rgba(160,140,220,0.08);
        }
        70% {
          box-shadow:
            0 0 0 1px rgba(180,155,70,0.22),
            0 0 12px rgba(180,155,70,0.12),
            0 0 34px rgba(120,100,185,0.20),
            0 0 68px rgba(90,70,165,0.10),
            inset 0 0 24px rgba(120,100,185,0.05);
        }
      }

      /* ── SHIMMER BLADE — lâmina que passa de vez em quando ── */
      .btn-shimmer-layer {
        position: absolute; inset: 0;
        border-radius: 0 6px 0 6px;
        overflow: hidden;
        pointer-events: none;
        z-index: 0;
      }
      .btn-shimmer-layer::before {
        content: '';
        position: absolute;
        top: -60%; left: -90%;
        width: 48%; height: 220%;
        background: linear-gradient(
          102deg,
          transparent 0%,
          rgba(255,245,160,0.04) 28%,
          rgba(255,228,100,0.22) 46%,
          rgba(255,248,190,0.42) 50%,
          rgba(255,228,100,0.22) 54%,
          rgba(255,245,160,0.04) 72%,
          transparent 100%
        );
        transform: skewX(-16deg);
        animation: shimmerPass 11s ease-in-out 15s infinite;
      }
      @keyframes shimmerPass {
        0%   { left: -90%; opacity: 0; }
        2%   { opacity: 1; }
        20%  { left: 140%; }
        21%  { opacity: 0; }
        100% { left: 140%; opacity: 0; }
      }

      /* ── BUTTON TEXT — pulsa junto com a lâmina ── */
      .btn-text {
        position: relative; z-index: 1;
        display: inline-block;
        animation: textPulse 11s ease-in-out 15s infinite;
      }
      @keyframes textPulse {
        0%   { letter-spacing: 0.08em; font-size: 10px; }
        6%   { letter-spacing: 0.15em; font-size: 10.8px; }
        20%  { letter-spacing: 0.08em; font-size: 10px; }
        100% { letter-spacing: 0.08em; font-size: 10px; }
      }

      /* ── PARTICLES ── */
      .particle { position: absolute; width:2px; height:2px; border-radius:50%; z-index:1; }
      .p1 { top:12%; left:18%;    background:var(--gold);   animation:float 6s   ease-in-out infinite; }
      .p2 { top:22%; right:15%;   background:var(--violet); animation:float 5s   ease-in-out infinite 1s; }
      .p3 { bottom:25%; left:22%; background:var(--gold);   animation:float 7s   ease-in-out infinite 2s; }
      .p4 { top:38%; right:12%;   background:var(--violet); width:1.5px; height:1.5px; animation:float 4.5s ease-in-out infinite 0.5s; }
      .p5 { bottom:35%; right:25%;background:var(--gold);   width:1px; height:1px; animation:float 6s ease-in-out infinite 3s; }
      @keyframes float {
        0%,100% { opacity:0.08; transform:translateY(0); }
        50%      { opacity:0.38; transform:translateY(-14px); }
      }

      @media (max-width: 480px) {
        .diorama-wrap { width: 92vw; }
      }

      /* ── HERO COPY ── */
      .hero-title {
        font-family: 'Cormorant Garamond', serif;
        font-style: italic;
        font-weight: 300;
        font-size: clamp(16px, 4.2vw, 22px);
        color: var(--bone);
        line-height: 1.45;
        letter-spacing: 0.01em;
        text-align: center;
        margin-bottom: 10px;
        min-height: 2.9em;
        position: relative;
        z-index: 3;
      }
      .hero-subtitle {
        font-family: 'Raleway', sans-serif;
        font-weight: 300;
        font-size: clamp(8px, 2.2vw, 10px);
        color: var(--bone-dim);
        letter-spacing: 0.04em;
        text-transform: none;
        font-style: italic;
        line-height: 1.75;
        text-align: center;
        margin-bottom: 20px;
        min-height: 2em;
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 1.4s ease, transform 1.4s ease;
        position: relative; z-index: 3;
      }
      .hero-subtitle.show { opacity: 1; transform: translateY(0); }

      .type-char {
        display: inline;
        opacity: 0;
        filter: blur(5px);
        transition: opacity 0.5s ease, filter 0.5s ease;
      }
      .type-char.visible { opacity: 1; filter: blur(0); }

      .type-cursor {
        display: inline-block;
        width: 1.5px; height: 0.82em;
        background: var(--gold);
        margin-left: 2px;
        vertical-align: middle;
        position: relative; top: -0.04em;
        animation: cursorBlink 1.1s ease-in-out infinite;
        transition: opacity 0.8s ease;
      }
      .type-cursor.done { animation: none; opacity: 0; }
      @keyframes cursorBlink {
        0%,42%  { opacity: 0.85; }
        52%,92% { opacity: 0; }
        100%    { opacity: 0.85; }
      }

      /* ═══════════════════════════════════════════════════════════
         EFFECT 1 — CINEMATIC GRAIN
         ═══════════════════════════════════════════════════════════ */
      #grainCanvas {
        position: fixed; inset: 0; z-index: 14;
        pointer-events: none;
        mix-blend-mode: overlay;
        opacity: 0.55;
        width: 100%; height: 100%;
      }

      /* ═══════════════════════════════════════════════════════════
         EFFECT 3 — PRESSÁGIOS EMERGENTES
         ═══════════════════════════════════════════════════════════ */
      .pressagio {
        position: fixed;
        pointer-events: none;
        z-index: 40;
        font-family: 'Cormorant Garamond', serif;
        font-style: italic;
        font-size: 11px;
        letter-spacing: 6px;
        color: rgba(201,162,74,0.45);
        opacity: 0;
        transition: none;
        white-space: nowrap;
        text-transform: uppercase;
      }
      .pressagio.fade-in  { animation: pressagioIn  2s ease forwards; }
      .pressagio.fade-out { animation: pressagioOut 2s ease forwards; }
      @keyframes pressagioIn {
        from { opacity: 0; } to { opacity: 1; }
      }
      @keyframes pressagioOut {
        from { opacity: 1; } to { opacity: 0; }
      }

      /* ═══════════════════════════════════════════════════════════
         EFFECT 5 — CONSTELAÇÕES
         ═══════════════════════════════════════════════════════════ */
      #constellationCanvas {
        position: fixed; inset: 0; z-index: 1;
        pointer-events: none;
        width: 100%; height: 100%;
      }

      /* ═══════════════════════════════════════════════════════════
         EFFECT 6 — CURSOR DE CRISTAL
         ═══════════════════════════════════════════════════════════ */
      body { cursor: none; }
      .crystal-cursor {
        position: fixed;
        pointer-events: none;
        z-index: 9999;
        width: 32px; height: 32px;
        border-radius: 50%;
        border: 1px solid rgba(201,162,74,0.4);
        background: rgba(201,162,74,0.03);
        backdrop-filter: blur(2px) brightness(1.15);
        -webkit-backdrop-filter: blur(2px) brightness(1.15);
        transform: translate(-50%, -50%);
        transition: width 0.25s ease, height 0.25s ease, border-color 0.25s ease;
        filter: url(#crystalDistort);
        top: -100px; left: -100px;
      }
      .crystal-cursor.expanded {
        width: 44px; height: 44px;
        border-color: rgba(201,162,74,0.7);
      }

      /* ═══════════════════════════════════════════════════════════
         EFFECT 7 — ÁUDIO AMBIENTE
         ═══════════════════════════════════════════════════════════ */
      .audio-toggle {
        position: fixed;
        bottom: 24px; right: 20px;
        z-index: 60;
        width: 28px; height: 28px;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
        opacity: 0;
        transition: opacity 0.6s ease;
        background: none; border: none; padding: 0;
      }
      .audio-toggle.show { opacity: 1; }
      .audio-toggle svg { transition: filter 0.3s ease; }
      .audio-toggle.active svg {
        filter: drop-shadow(0 0 4px rgba(201,162,74,0.6));
      }
      .audio-toggle svg path, .audio-toggle svg rect {
        transition: fill 0.3s ease, stroke 0.3s ease;
      }
      .audio-toggle.active svg path,
      .audio-toggle.active svg rect {
        stroke: rgba(201,162,74,0.8);
      }

      /* ═══════════════════════════════════════════════════════════
         EFFECT 8 — HORA E FASE LUNAR
         ═══════════════════════════════════════════════════════════ */
      .lunar-clock {
        position: fixed;
        bottom: 24px; left: 20px;
        z-index: 60;
        display: flex; align-items: center; gap: 7px;
        opacity: 0;
        transition: opacity 0.6s ease;
        pointer-events: none;
      }
      .lunar-clock.show { opacity: 1; }
      .lunar-clock svg { flex-shrink: 0; }
      .lunar-time {
        font-family: 'JetBrains Mono', monospace;
        font-size: 8px;
        letter-spacing: 3px;
        color: rgba(201,162,74,0.45);
        font-weight: 300;
      }

      /* ═══════════════════════════════════════════════════════════
         MOBILE ADAPTATIONS & PERFORMANCE
         ═══════════════════════════════════════════════════════════ */

      /* Cursor: desabilita em touch (sem mouse) */
      @media (hover: none) {
        body { cursor: auto !important; }
        .crystal-cursor { display: none !important; }
      }

      /* Presságios: menores em telas pequenas, evitam hero content */
      @media (max-width: 480px) {
        .pressagio {
          font-size: 9px;
          letter-spacing: 3px;
        }
      }

      /* Fumaça: apenas 2 wisps em mobile (blur é caro na GPU) */
      @media (max-width: 480px) {
        .smoke-orb:nth-child(n+3) { display: none; }
      }

      /* Relógio lunar e áudio: posição mobile */
      @media (max-width: 480px) {
        .lunar-clock {
          bottom: 14px;
          left: 14px;
          gap: 5px;
        }
        .lunar-time {
          font-size: 7px;
          letter-spacing: 2px;
        }
        .audio-toggle {
          bottom: 14px;
          right: 14px;
          width: 24px;
          height: 24px;
        }
      }

      /* Subtitle: mínimo legível em mobile */
      @media (max-width: 480px) {
        .hero-subtitle {
          font-size: 10px !important;
          letter-spacing: 0.02em;
        }
        .hero-title {
          font-size: clamp(17px, 5vw, 22px);
        }
      }

      /* ── MENU MOBILE: grid adaptado ── */
      @media (max-width: 480px) {
        .menu-inner {
          padding: 72px 20px 36px;
        }
        .menu-nav { margin-top: -8px; }
        .menu-nav-item { padding: 16px 0; }
        .item-label {
          font-size: clamp(22px, 7vw, 28px);
        }
        .item-sub { padding-left: 32px; font-size: 10px; }
        .menu-tagline { font-size: 12px; }
        .menu-footer { gap: 10px; }
      }

      /* ── LUNAR CLOCK: centralizado e legível em mobile ── */
      @media (max-width: 480px) {
        .lunar-clock {
          bottom: 12px;
          left: 50%;
          transform: translateX(-50%);
          background: rgba(0,0,0,0.4);
          padding: 4px 10px;
          border: 1px solid rgba(201,162,74,0.08);
          border-radius: 0 3px 0 3px;
        }
        .lunar-time {
          font-size: 8px;
          letter-spacing: 2px;
        }
        /* audio toggle fica acima do clock no mobile */
        .audio-toggle {
          bottom: 12px;
          right: 14px;
        }
      }
    </style>
  </head>
  <body>
    <!-- SVG filters for crystal cursor distortion -->
    <svg style="position:absolute;width:0;height:0;overflow:hidden;" aria-hidden="true">
      <defs>
        <filter id="crystalDistort" x="-20%" y="-20%" width="140%" height="140%">
          <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" seed="2" result="noise"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
      </defs>
    </svg>

    <!-- Effect 1: Cinematic grain canvas -->
    <canvas id="grainCanvas"></canvas>

    <!-- Effect 5: Constellation canvas -->
    <canvas id="constellationCanvas"></canvas>

    <!-- Effect 6: Crystal cursor -->
    <div class="crystal-cursor" id="crystalCursor"></div>

    <!-- Permanent vignette frame -->
    <div class="scene-vignette" id="sceneVignette"></div>

    <!-- Atmospheric smoke — breaks solid black background -->
    <div class="smoke">
      <div class="smoke-orb"></div>
      <div class="smoke-orb"></div>
      <div class="smoke-orb"></div>
      <div class="smoke-orb"></div>
      <div class="smoke-orb"></div>
    </div>

    <!-- Stage seal — black, above hero, below lamp cone -->
    <div class="stage-dark" id="stageDark"></div>

    <!-- ═══ CEILING LAMP ═══════════════════════════════════════════
         The ONLY light source. No reveal blobs.
         Lamp turns on → cone falls down → darkness lifts → scene revealed.
         ══════════════════════════════════════════════════════════ -->

    <!-- Light cone: trapezoid clip, above stage-dark, glows through darkness -->
    <div class="lamp-cone"    id="lampCone"></div>
    <!-- Ambient scatter outside cone -->
    <div class="lamp-ambient" id="lampAmbient"></div>

    <!-- Fixture: cord + shade + bulb -->
    <div class="lamp-wrap" id="lampWrap">
      <div class="lamp-canopy"></div>
      <div class="lamp-cord"></div>
      <div class="lamp-socket"></div>
      <div class="lamp-shade">
        <div class="lamp-bulb" id="lampBulb"></div>
      </div>

    <script>
      /* ══════════════════════════════════════════════════════════
         VELVET CURTAIN — canvas cloth simulation
         ══════════════════════════════════════════════════════════ */
      class VelvetCurtain {
        constructor(canvas, side) {
          this.canvas = canvas;
          this.ctx    = canvas.getContext('2d');
          this.side   = side;
          this.FOLDS  = 9; this.ROWS = 52;
          this.t = 0; this.openP = 0; this.antP = 0;
          this.opening = false; this.anticipating = false; this.alive = true;
          this._resize();
          window.addEventListener('resize', () => this._resize());
          requestAnimationFrame(ts => this._loop(ts));
        }
        _resize() {
          const dpr = window.devicePixelRatio || 1;
          this.canvas.width  = this.canvas.offsetWidth  * dpr;
          this.canvas.height = this.canvas.offsetHeight * dpr;
          this.W = this.canvas.width; this.H = this.canvas.height;
        }
        _cx(c, yF, t) {
          const W = this.W, total = this.FOLDS * 2 + 1;
          const base = (c / total) * W;
          // ef: how close to the free edge (0=anchored wall, 1=free center edge)
          const ef = this.side === 'left' ? c / total : 1 - c / total;
          // anticipation shimmer — free edge shakes more
          const ant = Math.sin(t * 13 + c * 1.05) * this.antP * 7 * ef;
          // three-frequency sway for organic breath — dies as curtain opens
          const sa  = (1.6 + ef * 2.6) * (1 - this.openP);
          const sway = Math.sin(t * 0.44 + c * 0.68) * sa
                     + Math.sin(t * 0.87 + c * 1.22) * sa * 0.40
                     + Math.sin(t * 1.51 + c * 0.48) * sa * 0.18;
          let openX = 0;
          if (this.openP > 0) {
            const eased = 1 - Math.pow(1 - this.openP, 3);
            openX = (this.side === 'left' ? -1 : 1) * eased * W * 1.12;
          }
          return base + ant + sway + openX;
        }
        _draw(t) {
          const ctx = this.ctx, W = this.W, H = this.H;
          ctx.clearRect(0, 0, W, H);
          const total = this.FOLDS * 2 + 1;

          for (let c = 0; c < total - 1; c++) {
            const isPeak = c % 2 === 0;
            const Lx = [], Rx = [];
            for (let r = 0; r <= this.ROWS; r++) {
              const yF = r / this.ROWS;
              Lx.push(this._cx(c, yF, t));
              Rx.push(this._cx(c + 1, yF, t));
            }

            ctx.beginPath();
            ctx.moveTo(Lx[0], 0);
            for (let r = 1; r <= this.ROWS; r++) ctx.lineTo(Lx[r], (r / this.ROWS) * H);
            for (let r = this.ROWS; r >= 0; r--) ctx.lineTo(Rx[r], (r / this.ROWS) * H);
            ctx.closePath();

            const g = ctx.createLinearGradient(this._cx(c, 0.5, t), 0, this._cx(c + 1, 0.5, t), 0);
            if (isPeak) {
              g.addColorStop(0,   'rgba(3,2,5,1)');
              g.addColorStop(0.3, 'rgba(12,8,16,1)');
              g.addColorStop(0.5, 'rgba(16,10,20,1)');
              g.addColorStop(0.7, 'rgba(12,8,16,1)');
              g.addColorStop(1,   'rgba(3,2,5,1)');
            } else {
              g.addColorStop(0,   'rgba(2,1,3,1)');
              g.addColorStop(0.5, 'rgba(2,1,4,1)');
              g.addColorStop(1,   'rgba(2,1,3,1)');
            }
            ctx.fillStyle = g;
            ctx.fill();
          }

          // top shadow + bottom vignette
          const dg = ctx.createLinearGradient(0, 0, 0, H);
          dg.addColorStop(0,    'rgba(0,0,0,0.72)');
          dg.addColorStop(0.06, 'rgba(0,0,0,0)');
          dg.addColorStop(0.80, 'rgba(0,0,0,0)');
          dg.addColorStop(1,    'rgba(0,0,0,0.90)');
          ctx.fillStyle = dg;
          ctx.fillRect(0, 0, W, H);

          ctx.globalAlpha = 0.6;
          for (let x = 0; x < W; x += 9) {
            ctx.fillStyle = x % 18 === 0 ? 'rgba(160,122,44,0.85)' : 'rgba(90,68,22,0.7)';
            ctx.fillRect(x, H - 20, 1.4, 20);
          }
          ctx.globalAlpha = 1;
        }
        _loop(ts) {
          this.t = ts * 0.001;
          if (this.anticipating && this.antP < 1)       this.antP = Math.min(1, this.antP + 0.045);
          else if (!this.anticipating && this.antP > 0) this.antP = Math.max(0, this.antP - 0.018);
          // slower open — majestic sweep
          if (this.opening && this.openP < 1) this.openP = Math.min(1, this.openP + 0.0065);
          this._draw(this.t);
          if (this.alive) requestAnimationFrame(ts => this._loop(ts));
        }
        open() {
          this.anticipating = true;
          // longer anticipation breath before sweeping open
          setTimeout(() => { this.anticipating = false; this.opening = true; }, 820);
        }
      }

      /* ── ELEMENTS ── */
      const curtL      = new VelvetCurtain(document.getElementById('canvasLeft'),  'left');
      const curtR      = new VelvetCurtain(document.getElementById('canvasRight'), 'right');
      const pre        = document.getElementById('preloader');
      const nav        = document.getElementById('nav');
      const stageDark  = document.getElementById('stageDark');
      const lampWrap   = document.getElementById('lampWrap');
      const lampBulb   = document.getElementById('lampBulb');
      const lampCone   = document.getElementById('lampCone');
      const lampAmbient= document.getElementById('lampAmbient');
      const lampHalo   = document.getElementById('lampHalo');
      const vignette   = document.getElementById('sceneVignette');

      /* ── SEQUENCE ─────────────────────────────────────────────
         t=0.8s   lamp fixture ghosts in (fixture + halo)
         t=1.8s   bulb begins dim warm-up + cone starts
         t=2.2s   curtains open (anticipation 820ms → sweep at ~3.0s)
         t=2.4s   stage-dark begins slow fade — light bleeds through
                  as curtains part; scene emerges organically
         t=5.2s   vignette frames the scene
         t=6.2s   nav appears
         t=5.0s   bulb warm-up completes → idle flicker
         t=7.2s   curtains fade (scene fully revealed)
         t=8.2s   cleanup
         ───────────────────────────────────────────────────────── */

      // t=0.8s  fixture + halo appear (lamp is already there, just waking)
      setTimeout(() => {
        lampWrap.classList.add('on');
        lampHalo.classList.add('on');
      }, 800);

      // t=1.8s  bulb starts warming + cone begins
      setTimeout(() => {
        lampBulb.classList.add('ignite');
        lampCone.classList.add('on');
      }, 1800);

      // t=2.2s  curtains begin their sweep
      setTimeout(() => { curtL.open(); curtR.open(); }, 2200);

      // t=2.4s  darkness lifts gradually — synced with curtain parting
      // scene reveals as curtains open, not after
      setTimeout(() => {
        stageDark.style.transition = 'opacity 4.4s cubic-bezier(0.28, 0, 0.08, 1)';
        stageDark.style.opacity = '0';
      }, 2400);

      // t=5.2s  vignette
      setTimeout(() => vignette.classList.add('show'), 5200);

      // t=6.2s  nav
      setTimeout(() => nav.classList.add('show'), 6200);

      // t=1.8s + 3.2s = 5.0s  bulb warm-up done → idle flicker
      setTimeout(() => {
        lampBulb.classList.remove('ignite');
        lampBulb.classList.add('steady');
      }, 5000);

      // t=7.2s  curtains fade out
      setTimeout(() => { pre.classList.add('fade'); document.body.classList.add('loaded'); }, 7200);

      // t=8.2s  remove preloader + kill curtain RAF loops
      setTimeout(() => {
        pre.style.display = 'none';
        curtL.alive = false;
        curtR.alive = false;
      }, 8500);

      // slow video
      document.querySelector('.diorama-img').playbackRate = 0.6;

      /* ── TYPEWRITER — título e subtítulo ── */
      (function () {
        const titleEl    = document.getElementById('heroTitle');
        const subtitleEl = document.getElementById('heroSubtitle');
        const cursor     = document.getElementById('typeCursor');
        const TITLE_1 = 'Suas mãos já sabem.';
        const TITLE_2 = 'Você ainda não.';
        const SUB     = 'Uma foto. 30 segundos. E eu te conto o que você esconde de todo mundo.';

        function typeChars(el, text, base, variance) {
          return new Promise(resolve => {
            let i = 0;
            function next() {
              if (i >= text.length) { resolve(); return; }
              const ch = text[i++];
              const span = document.createElement('span');
              span.className = 'type-char';
              span.textContent = ch;
              el.insertBefore(span, cursor);
              requestAnimationFrame(() => requestAnimationFrame(() => span.classList.add('visible')));
              let wait = base + Math.random() * variance;
              if (ch === '.')      wait += 460;
              else if (ch === ',') wait += 180;
              else if (ch === ' ') wait -= 10;
              setTimeout(next, wait);
            }
            next();
          });
        }

        async function run() {
          await typeChars(titleEl, TITLE_1, 52, 48);
          // quebra de linha entre as duas frases
          const br = document.createElement('br');
          titleEl.insertBefore(br, cursor);
          await new Promise(r => setTimeout(r, 480));
          await typeChars(titleEl, TITLE_2, 52, 48);
          await new Promise(r => setTimeout(r, 1100));
          cursor.classList.add('done');
          subtitleEl.textContent = SUB;
          await new Promise(r => setTimeout(r, 80));
          subtitleEl.classList.add('show');
        }

        // start after curtains fade + scene is pristine
        setTimeout(run, 8300);
      })();

      /* ── EMBER PARTICLES near video ── */
      (function() {
        const wrap = document.querySelector('.diorama-wrap');
        if (!wrap) return;
        const cols = ['rgba(201,162,74,','rgba(228,192,80,','rgba(255,215,90,','rgba(180,130,50,'];
        function emit() {
          const p = document.createElement('div');
          const sz = Math.random() * 2.2 + 0.6;
          const x  = 15 + Math.random() * 70;
          const dur= 3500 + Math.random() * 4000;
          const dx = (Math.random() - 0.5) * 38;
          const c  = cols[Math.floor(Math.random() * cols.length)];
          const a  = 0.55 + Math.random() * 0.45;
          p.style.cssText = `position:absolute;width:${sz}px;height:${sz}px;border-radius:50%;left:${x}%;bottom:4px;background:${c}${a});box-shadow:0 0 ${sz*5}px ${c}0.9), 0 0 ${sz*10}px ${c}0.5);pointer-events:none;z-index:5;`;
          wrap.appendChild(p);
          p.animate([
            {transform:'translate(0,0) scale(1)',opacity:0},
            {transform:`translate(${dx*.3}px,-28px) scale(1.6)`,opacity:1,offset:.18},
            {transform:`translate(${dx}px,-90px) scale(1.1)`,opacity:a,offset:.55},
            {transform:`translate(${dx*1.5}px,-160px) scale(.4)`,opacity:0}
          ],{duration:dur,easing:'ease-out',fill:'forwards'}).onfinish=()=>p.remove();
        }
        setTimeout(()=>{ emit(); setInterval(emit, 700); }, 6800);
      })();
    </script>

    <script>
    /* ══════════════════════════════════════════════════════════════
       EFFECT 1 — CINEMATIC GRAIN (animated ImageData noise)
       ══════════════════════════════════════════════════════════════ */
    (function() {
      const canvas = document.getElementById('grainCanvas');
      const ctx = canvas.getContext('2d');
      let W, H, frame = 0;

      function resize() {
        // Draw at capped resolution (max 400px wide) — CSS scales up.
        // Avoids 2.7M-pixel fills on Retina/mobile DPR screens.
        const scale = Math.min(1, 400 / window.innerWidth);
        W = canvas.width  = Math.ceil(window.innerWidth  * scale);
        H = canvas.height = Math.ceil(window.innerHeight * scale);
        canvas.style.width  = window.innerWidth  + 'px';
        canvas.style.height = window.innerHeight + 'px';
      }

      function drawGrain() {
        const imageData = ctx.createImageData(W, H);
        const data = imageData.data;
        const len = data.length;
        for (let i = 0; i < len; i += 4) {
          const v = (Math.random() * 255) | 0;
          data[i] = data[i+1] = data[i+2] = v;
          data[i + 3] = (18 + Math.random() * 4) | 0;
        }
        ctx.putImageData(imageData, 0, 0);
      }

      function loop() {
        drawGrain();
        setTimeout(loop, 80); // ~12fps — imperceptível para grain
      }

      resize();
      window.addEventListener('resize', resize);
      loop();
    })();

    /* ══════════════════════════════════════════════════════════════
       EFFECT 2 — TILT MAGNÉTICO NO VÍDEO (3D parallax)
       ══════════════════════════════════════════════════════════════ */
    (function() {
      const wrap = document.querySelector('.diorama-wrap');
      if (!wrap) return;

      let targetX = 0, targetY = 0;
      let currentX = 0, currentY = 0;
      const LERP = 0.06;
      const MAX_X = 6;  // deg rotateX
      const MAX_Y = 9;  // deg rotateY

      // Set perspective on parent (hero)
      const hero = document.getElementById('hero');
      if (hero) hero.style.perspective = '900px';

      function lerp(a, b, t) { return a + (b - a) * t; }

      function tick() {
        currentX = lerp(currentX, targetX, LERP);
        currentY = lerp(currentY, targetY, LERP);
        wrap.style.transform = `rotateX(${currentX.toFixed(3)}deg) rotateY(${currentY.toFixed(3)}deg)`;
        requestAnimationFrame(tick);
      }

      document.addEventListener('mousemove', function(e) {
        const cx = window.innerWidth  / 2;
        const cy = window.innerHeight / 2;
        // normalize [-1,1]
        const nx = (e.clientX - cx) / cx;
        const ny = (e.clientY - cy) / cy;
        // rotateX: mouse up → tilt top toward viewer (positive)
        targetX = -ny * MAX_X;
        targetY =  nx * MAX_Y;
      });

      // Mobile: deviceorientation
      if (window.DeviceOrientationEvent) {
        window.addEventListener('deviceorientation', function(e) {
          if (e.beta == null || e.gamma == null) return;
          const nx = Math.max(-1, Math.min(1, e.gamma / 30));
          const ny = Math.max(-1, Math.min(1, (e.beta - 45) / 30));
          targetX = -ny * (MAX_X * 0.5);
          targetY =  nx * (MAX_Y * 0.5);
        });
      }

      requestAnimationFrame(tick);
    })();

    /* ══════════════════════════════════════════════════════════════
       EFFECT 3 — PRESSÁGIOS EMERGENTES
       ══════════════════════════════════════════════════════════════ */
    (function() {
      const words = ['REVELAÇÃO','SEGREDO','VEM','SABE','VEJO','SEMPRE','NUNCA','AGORA','ESPERA','SINTO'];
      const MARGIN = 0.15;

      function showPressagio() {
        const word = words[Math.floor(Math.random() * words.length)];
        const el = document.createElement('span');
        el.className = 'pressagio';
        el.textContent = word;

        const mobile = window.innerWidth < 480;
        // Em mobile: evita topo (nav), meio (hero content) e rodapé (clock/audio)
        const topMin  = mobile ? 0.08 : MARGIN;
        const topMax  = mobile ? 0.35 : 1 - MARGIN * 2; // só aparece na metade superior
        const leftMax = mobile ? 0.55 : 1 - MARGIN * 2; // evita borda direita em telas estreitas
        const left = MARGIN + Math.random() * leftMax;
        const top  = topMin  + Math.random() * (topMax - topMin);
        el.style.left = (left * 100).toFixed(1) + '%';
        el.style.top  = (top  * 100).toFixed(1) + '%';

        document.body.appendChild(el);

        // fade in
        requestAnimationFrame(() => {
          el.classList.add('fade-in');
        });

        // fade out after fade-in(2s) + stay(3s) = 5s
        setTimeout(() => {
          el.classList.remove('fade-in');
          el.classList.add('fade-out');
          setTimeout(() => el.remove(), 2000);
        }, 5000);

        // schedule next
        const next = 18000 + Math.random() * 7000;
        setTimeout(showPressagio, next);
      }

      // start after 12s
      setTimeout(showPressagio, 12000);
    })();

    /* ══════════════════════════════════════════════════════════════
       EFFECT 4 — TEXTO QUE SE DISSOLVE EM FUMAÇA
       ══════════════════════════════════════════════════════════════ */
    (function() {
      function dissolveAndReform() {
        const cursor = document.getElementById('typeCursor');
        if (!cursor || !cursor.classList.contains('done')) {
          // typewriter not done yet, try again later
          setTimeout(dissolveAndReform, 5000);
          return;
        }

        const titleEl = document.getElementById('heroTitle');
        const chars = Array.from(titleEl.querySelectorAll('.type-char'));
        if (chars.length === 0) {
          setTimeout(dissolveAndReform, 40000);
          return;
        }

        // Dissolve: scatter each char with random translate + blur
        chars.forEach((ch, i) => {
          setTimeout(() => {
            const dx = (Math.random() - 0.5) * 30;
            const dy = (Math.random() - 0.5) * 20;
            ch.style.transition = 'opacity 0.7s ease, filter 0.7s ease, transform 0.7s ease';
            ch.style.transform  = `translate(${dx}px, ${dy}px)`;
            ch.style.opacity    = '0';
            ch.style.filter     = 'blur(8px)';
          }, i * 30);
        });

        // Reconstitute in reverse order after 1.5s
        const totalDissolve = chars.length * 30 + 700;
        setTimeout(() => {
          const reversed = [...chars].reverse();
          reversed.forEach((ch, i) => {
            setTimeout(() => {
              ch.style.transition = 'opacity 0.6s ease, filter 0.6s ease, transform 0.6s ease';
              ch.style.transform  = '';
              ch.style.opacity    = '1';
              ch.style.filter     = 'blur(0)';
            }, i * 28);
          });
        }, totalDissolve + 500);

        // Schedule next dissolve after 40s
        setTimeout(dissolveAndReform, 40000);
      }

      // Start after 20s
      setTimeout(dissolveAndReform, 20000);
    })();

    /* ══════════════════════════════════════════════════════════════
       EFFECT 5 — CONSTELAÇÕES NO FUNDO
       ══════════════════════════════════════════════════════════════ */
    (function() {
      const canvas = document.getElementById('constellationCanvas');
      const ctx = canvas.getContext('2d');
      let W, H;
      const isMobile = window.innerWidth < 480;
      const NUM_STARS = isMobile ? 25 : 55;
      const LINK_DIST = isMobile ? 80  : 120;
      let stars = [], constFrame = 0;

      function resize() {
        const dpr = window.devicePixelRatio || 1;
        W = canvas.width  = Math.ceil(window.innerWidth  * dpr);
        H = canvas.height = Math.ceil(window.innerHeight * dpr);
        canvas.style.width  = window.innerWidth  + 'px';
        canvas.style.height = window.innerHeight + 'px';
        // rescale star positions if already created
        if (stars.length) {
          stars.forEach(s => {
            s.x = s.rx * W;
            s.y = s.ry * H;
          });
        }
      }

      function createStars() {
        stars = [];
        for (let i = 0; i < NUM_STARS; i++) {
          const rx = Math.random();
          const ry = Math.random();
          stars.push({
            rx, ry,
            x: rx * W, y: ry * H,
            r: 0.5 + Math.random() * 1.3,
            base_opacity: 0.1 + Math.random() * 0.4,
            pulse_speed: 0.004 + Math.random() * 0.008,
            pulse_offset: Math.random() * Math.PI * 2,
            vx: (Math.random() - 0.5) * 0.12,
            vy: (Math.random() - 0.5) * 0.12,
          });
        }
      }

      function draw(ts) {
        constFrame++;
        if (isMobile && constFrame % 2 !== 0) { requestAnimationFrame(draw); return; }
        ctx.clearRect(0, 0, W, H);
        const t = ts * 0.001;

        // update positions
        stars.forEach(s => {
          s.x += s.vx;
          s.y += s.vy;
          // bounce
          if (s.x < 0)  { s.x = 0;  s.vx *= -1; }
          if (s.x > W)  { s.x = W;  s.vx *= -1; }
          if (s.y < 0)  { s.y = 0;  s.vy *= -1; }
          if (s.y > H)  { s.y = H;  s.vy *= -1; }
          // update relative position for resize
          s.rx = s.x / W;
          s.ry = s.y / H;
        });

        // draw connections
        for (let i = 0; i < stars.length; i++) {
          for (let j = i + 1; j < stars.length; j++) {
            const dx = stars[i].x - stars[j].x;
            const dy = stars[i].y - stars[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < LINK_DIST) {
              const alpha = (1 - dist / LINK_DIST) * 0.06;
              ctx.beginPath();
              ctx.moveTo(stars[i].x, stars[i].y);
              ctx.lineTo(stars[j].x, stars[j].y);
              ctx.strokeStyle = `rgba(201,162,74,${alpha.toFixed(3)})`;
              ctx.lineWidth = 0.4;
              ctx.stroke();
            }
          }
        }

        // draw stars
        stars.forEach(s => {
          const pulse = 0.5 + 0.5 * Math.sin(t * s.pulse_speed * 1000 + s.pulse_offset);
          const opacity = s.base_opacity * (0.6 + 0.4 * pulse);
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(201,162,74,${opacity.toFixed(3)})`;
          ctx.fill();
        });

        requestAnimationFrame(draw);
      }

      resize();
      createStars();
      window.addEventListener('resize', () => {
        resize();
      });
      requestAnimationFrame(draw);
    })();

    /* ══════════════════════════════════════════════════════════════
       EFFECT 6 — CURSOR DE CRISTAL COM DISTORÇÃO
       ══════════════════════════════════════════════════════════════ */
    (function() {
      const cursor = document.getElementById('crystalCursor');
      if (!cursor) return;

      let mouseX = -200, mouseY = -200;
      let curX = -200, curY = -200;
      const LERP = 0.12;

      function lerp(a, b, t) { return a + (b - a) * t; }

      document.addEventListener('mousemove', function(e) {
        mouseX = e.clientX;
        mouseY = e.clientY;
      });

      // expand on clickable elements
      const clickables = 'button, a, [role="button"], input, select, label';
      document.addEventListener('mouseover', function(e) {
        if (e.target.closest(clickables)) {
          cursor.classList.add('expanded');
        }
      });
      document.addEventListener('mouseout', function(e) {
        if (e.target.closest(clickables)) {
          cursor.classList.remove('expanded');
        }
      });

      // hide cursor when it leaves the window
      document.addEventListener('mouseleave', () => cursor.style.opacity = '0');
      document.addEventListener('mouseenter', () => cursor.style.opacity = '1');

      function tick() {
        curX = lerp(curX, mouseX, LERP);
        curY = lerp(curY, mouseY, LERP);
        cursor.style.left = curX.toFixed(2) + 'px';
        cursor.style.top  = curY.toFixed(2) + 'px';
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);

      // hide cursor on mobile (touch devices)
      window.addEventListener('touchstart', () => cursor.style.display = 'none', { once: true });
    })();

    /* ══════════════════════════════════════════════════════════════
       EFFECT 7 — ÁUDIO AMBIENTE OPT-IN
       ══════════════════════════════════════════════════════════════ */
    (function() {
      const btn = document.getElementById('audioToggle');
      if (!btn) return;

      let audioCtx = null;
      let nodes = [];
      let active = false;

      function createPinkNoise(ctx) {
        const bufSize = ctx.sampleRate * 2;
        const buffer = ctx.createBuffer(1, bufSize, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
        for (let i = 0; i < bufSize; i++) {
          const white = Math.random() * 2 - 1;
          b0 = 0.99886 * b0 + white * 0.0555179;
          b1 = 0.99332 * b1 + white * 0.0750759;
          b2 = 0.96900 * b2 + white * 0.1538520;
          b3 = 0.86650 * b3 + white * 0.3104856;
          b4 = 0.55000 * b4 + white * 0.5329522;
          b5 = -0.7616 * b5 - white * 0.0168980;
          data[i] = (b0+b1+b2+b3+b4+b5+b6 + white * 0.5362) / 7.0;
          b6 = white * 0.115926;
        }
        return buffer;
      }

      function startAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // 1) Low drone — 40Hz presence
        const drone = audioCtx.createOscillator();
        drone.type = 'sine';
        drone.frequency.value = 40;
        const droneGain = audioCtx.createGain();
        droneGain.gain.value = 0.04;
        drone.connect(droneGain);
        droneGain.connect(audioCtx.destination);
        drone.start();

        // 2) Pink noise filtered ambient
        const pinkBuf = createPinkNoise(audioCtx);
        const pinkSrc = audioCtx.createBufferSource();
        pinkSrc.buffer = pinkBuf;
        pinkSrc.loop = true;
        const lpf = audioCtx.createBiquadFilter();
        lpf.type = 'lowpass';
        lpf.frequency.value = 800;
        const pinkGain = audioCtx.createGain();
        pinkGain.gain.value = 0.018;
        pinkSrc.connect(lpf);
        lpf.connect(pinkGain);
        pinkGain.connect(audioCtx.destination);
        pinkSrc.start();

        // 3) Crystal tone 432Hz with LFO vibrato
        const crystal = audioCtx.createOscillator();
        crystal.type = 'sine';
        crystal.frequency.value = 432;
        const lfo = audioCtx.createOscillator();
        lfo.type = 'sine';
        lfo.frequency.value = 0.08;
        const lfoGain = audioCtx.createGain();
        lfoGain.gain.value = 3; // ±3Hz vibrato
        lfo.connect(lfoGain);
        lfoGain.connect(crystal.frequency);
        const crystalGain = audioCtx.createGain();
        crystalGain.gain.value = 0.012;
        crystal.connect(crystalGain);
        crystalGain.connect(audioCtx.destination);
        crystal.start();
        lfo.start();

        nodes = [drone, pinkSrc, crystal, lfo];
      }

      function stopAudio() {
        if (!audioCtx) return;
        nodes.forEach(n => { try { n.stop(); } catch(e) {} });
        audioCtx.close();
        audioCtx = null;
        nodes = [];
      }

      btn.addEventListener('click', function() {
        active = !active;
        if (active) {
          startAudio();
          btn.classList.add('active');
        } else {
          stopAudio();
          btn.classList.remove('active');
        }
      });
    })();

    /* ══════════════════════════════════════════════════════════════
       EFFECT 8 — HORA E FASE LUNAR
       ══════════════════════════════════════════════════════════════ */
    (function() {
      const timeEl = document.getElementById('lunarTime');
      if (!timeEl) return;

      // Lunar phase calculation
      // Known new moon: 2000-01-06T18:14:00Z (Julian Date ~2451549.5)
      function getLunarPhase(date) {
        const knownNewMoon = new Date('2000-01-06T18:14:00Z');
        const msPerDay = 86400000;
        const synodicPeriod = 29.53058867;
        const daysSince = (date - knownNewMoon) / msPerDay;
        let phase = ((daysSince % synodicPeriod) + synodicPeriod) % synodicPeriod;
        // 0 = new moon, ~14.75 = full moon
        return phase;
      }

      // Draw moon into the container SVG element
      function renderMoon(phase) {
        const container = document.getElementById('lunarIcon');
        if (!container) return;
        const p = phase / 29.53058867;
        const sector = Math.round(p * 8) % 8;
        const r = 5, cx = 7, cy = 7;
        const gold = 'rgba(201,162,74,0.5)';
        const dark = 'rgba(20,12,35,0.95)';
        const outline = 'rgba(201,162,74,0.3)';

        container.innerHTML = '';
        container.setAttribute('viewBox', '0 0 14 14');
        container.setAttribute('width', '14');
        container.setAttribute('height', '14');

        function addEl(tag, attrs) {
          const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
          Object.keys(attrs).forEach(k => el.setAttribute(k, attrs[k]));
          container.appendChild(el);
        }

        // base circle
        addEl('circle', { cx, cy, r, fill: sector >= 4 ? gold : dark, stroke: outline, 'stroke-width': '0.5' });

        if (sector === 0 || sector === 4) {
          // new or full — just the base circle
        } else if (sector === 2) {
          // first quarter — right half lit
          addEl('path', { d: `M${cx},${cy-r} A${r},${r} 0 0,1 ${cx},${cy+r} Z`, fill: gold });
        } else if (sector === 6) {
          // last quarter — left half lit
          addEl('path', { d: `M${cx},${cy-r} A${r},${r} 0 0,0 ${cx},${cy+r} Z`, fill: gold });
        } else if (sector === 1) {
          // waxing crescent
          addEl('circle', { cx, cy, r, fill: dark, stroke: outline, 'stroke-width': '0.5' });
          addEl('path', { d: `M${cx},${cy-r} A${r*0.3},${r} 0 0,1 ${cx},${cy+r} A${r},${r} 0 0,1 ${cx},${cy-r} Z`, fill: gold });
        } else if (sector === 3) {
          // waxing gibbous
          addEl('path', { d: `M${cx},${cy-r} A${r*0.3},${r} 0 0,0 ${cx},${cy+r} A${r},${r} 0 0,1 ${cx},${cy-r} Z`, fill: dark });
        } else if (sector === 5) {
          // waning gibbous
          addEl('path', { d: `M${cx},${cy-r} A${r*0.3},${r} 0 0,1 ${cx},${cy+r} A${r},${r} 0 0,0 ${cx},${cy-r} Z`, fill: dark });
        } else if (sector === 7) {
          // waning crescent
          addEl('circle', { cx, cy, r, fill: dark, stroke: outline, 'stroke-width': '0.5' });
          addEl('path', { d: `M${cx},${cy-r} A${r*0.3},${r} 0 0,0 ${cx},${cy+r} A${r},${r} 0 0,0 ${cx},${cy-r} Z`, fill: gold });
        }
      }

      function updateClock() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        timeEl.textContent = h + ':' + m;
        renderMoon(getLunarPhase(now));
      }

      updateClock();
      setInterval(updateClock, 1000);
    })();

    /* ── MENU MOBILE ── */
    (function() {
      const trigger = document.getElementById('menuTrigger');
      const overlay = document.getElementById('menuOverlay');
      if (!trigger || !overlay) return;
      const items = overlay.querySelectorAll('.menu-nav-item');

      function open()  { trigger.classList.add('open'); overlay.classList.add('open'); trigger.setAttribute('aria-expanded','true');  document.body.style.overflow='hidden'; }
      function close() { trigger.classList.remove('open'); overlay.classList.remove('open'); trigger.setAttribute('aria-expanded','false'); document.body.style.overflow=''; }

      trigger.addEventListener('click', () => overlay.classList.contains('open') ? close() : open());
      document.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });

      items.forEach(item => {
        item.addEventListener('click', e => {
          e.preventDefault();
          items.forEach(i => i.classList.remove('active'));
          item.classList.add('active');
          setTimeout(close, 320);
        });
      });
    })();

    /* ══════════════════════════════════════════════════════════════
       Show audio + lunar clock with nav (effect 7 & 8 visibility)
       ══════════════════════════════════════════════════════════════ */
    setTimeout(function() {
      const audioToggle = document.getElementById('audioToggle');
      const lunarClock  = document.getElementById('lunarClock');
      if (audioToggle) audioToggle.classList.add('show');
      if (lunarClock)  lunarClock.classList.add('show');
    }, 6200);

    </script>
  </body>
