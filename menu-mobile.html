<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MãosFalam — Menu Mobile</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cinzel+Decorative:wght@400;700&family=Raleway:wght@200;300;400;500&family=JetBrains+Mono:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --black:      #08050e;
        --deep:       #110c1a;
        --surface:    #171222;
        --gold:       #c9a24a;
        --gold-light: #d9b86a;
        --gold-dim:   #7a6832;
        --bone:       #e8dfd0;
        --bone-dim:   #9b9284;
        --violet:     #7b6ba5;
        --violet-dim: #4a3d6e;
        --rose:       #c4647a;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: "Raleway", sans-serif;
        background: var(--deep);
        color: var(--bone);
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      /* ══ DEMO BACKDROP ══ */
      .demo-bg {
        position: fixed; inset: 0;
        background:
          radial-gradient(ellipse 60% 50% at 30% 40%, rgba(201,162,74,0.03) 0%, transparent 70%),
          radial-gradient(ellipse 40% 60% at 75% 65%, rgba(123,107,165,0.04) 0%, transparent 70%);
        pointer-events: none;
      }
      .demo-grain {
        position: fixed; inset: 0; pointer-events: none; z-index: 1;
        opacity: 0.03;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      }

      /* ══ TRIGGER BUTTON (hamburger) ══ */
      .menu-trigger {
        position: fixed; top: 22px; right: 22px; z-index: 300;
        width: 44px; height: 44px;
        border: 1px solid rgba(201,162,74,0.12);
        background: rgba(8,5,14,0.85);
        backdrop-filter: blur(12px);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 5px; cursor: pointer;
        transition: border-color 0.3s, background 0.3s;
        border-radius: 0 5px 0 5px;
        position: relative;
      }
      /* corner accents */
      .menu-trigger::before, .menu-trigger::after {
        content: ''; position: absolute;
        width: 7px; height: 7px;
        border-style: solid; border-color: rgba(201,162,74,0.3);
        transition: all 0.3s;
      }
      .menu-trigger::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
      .menu-trigger::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }
      .menu-trigger:hover { border-color: rgba(201,162,74,0.28); }
      .menu-trigger:hover::before, .menu-trigger:hover::after {
        border-color: rgba(201,162,74,0.55);
        width: 10px; height: 10px;
      }
      .burger-line {
        display: block; height: 1px; background: var(--gold-dim);
        transition: all 0.4s cubic-bezier(0.23,1,0.32,1);
      }
      .burger-line:nth-child(1) { width: 16px; }
      .burger-line:nth-child(2) { width: 11px; }
      .burger-line:nth-child(3) { width: 6px; }
      /* open state transform */
      .menu-trigger.open .burger-line:nth-child(1) {
        width: 14px; transform: translateY(6px) rotate(45deg);
        background: var(--gold);
      }
      .menu-trigger.open .burger-line:nth-child(2) {
        opacity: 0; transform: scaleX(0);
      }
      .menu-trigger.open .burger-line:nth-child(3) {
        width: 14px; transform: translateY(-6px) rotate(-45deg);
        background: var(--gold);
      }

      /* ══ LOGO (nav) ══ */
      .nav-logo {
        position: fixed; top: 22px; left: 22px; z-index: 300;
        opacity: 0; transform: translateY(-8px);
        animation: fadeUp 0.6s ease 0.3s forwards;
      }
      @keyframes fadeUp {
        to { opacity: 1; transform: translateY(0); }
      }

      /* ══ MENU OVERLAY ══ */
      .menu-overlay {
        position: fixed; inset: 0; z-index: 200;
        pointer-events: none;
        display: flex; flex-direction: column;
      }

      /* The dark velvet curtain — clips from top */
      .menu-panel {
        position: absolute; inset: 0;
        background: var(--black);
        transform: translateY(-100%);
        transition: transform 0.72s cubic-bezier(0.86, 0, 0.07, 1);
        overflow: hidden;
      }
      .menu-overlay.open { pointer-events: all; }
      .menu-overlay.open .menu-panel {
        transform: translateY(0);
      }

      /* grain inside panel */
      .menu-panel::after {
        content: '';
        position: absolute; inset: 0; pointer-events: none; z-index: 0;
        opacity: 0.035;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      }

      /* warm radial glow at center */
      .menu-glow {
        position: absolute;
        width: 380px; height: 380px;
        left: 50%; top: 50%;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        background: radial-gradient(ellipse at center,
          rgba(201,162,74,0.055) 0%,
          rgba(123,107,165,0.04) 40%,
          transparent 70%);
        filter: blur(40px);
        pointer-events: none; z-index: 1;
        opacity: 0;
        transition: opacity 0.8s ease 0.4s;
      }
      .menu-overlay.open .menu-glow { opacity: 1; }

      /* sweep line that crosses before items appear */
      .menu-sweep {
        position: absolute;
        top: 50%; left: -10%; right: -10%; height: 1px;
        background: linear-gradient(90deg,
          transparent,
          rgba(201,162,74,0.18) 20%,
          rgba(201,162,74,0.35) 50%,
          rgba(201,162,74,0.18) 80%,
          transparent);
        transform: scaleX(0);
        transform-origin: left center;
        z-index: 2;
        pointer-events: none;
      }
      .menu-overlay.open .menu-sweep {
        animation: sweepLine 0.55s cubic-bezier(0.4, 0, 0.2, 1) 0.38s forwards;
      }
      @keyframes sweepLine {
        0%   { transform: scaleX(0); opacity: 1; }
        70%  { transform: scaleX(1); opacity: 1; }
        100% { transform: scaleX(1); opacity: 0; }
      }

      /* ══ MENU INNER LAYOUT ══ */
      .menu-inner {
        position: relative; z-index: 3;
        height: 100%; display: flex; flex-direction: column;
        padding: 90px 32px 52px;
        justify-content: space-between;
      }

      /* top brand mark */
      .menu-brand {
        display: flex; align-items: center; gap: 14px;
        opacity: 0; transform: translateY(10px);
        transition: opacity 0.5s ease, transform 0.5s ease;
      }
      .menu-overlay.open .menu-brand {
        opacity: 1; transform: translateY(0);
        transition-delay: 0.55s;
      }
      .menu-brand-icon {
        width: 28px; opacity: 0.6;
      }
      .menu-brand-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 8px; letter-spacing: 5px; text-transform: uppercase;
        color: var(--gold-dim);
      }

      /* ══ NAV ITEMS ══ */
      .menu-nav {
        display: flex; flex-direction: column;
        gap: 0;
        margin-top: -20px;
      }

      .nav-item {
        display: block; position: relative;
        padding: 22px 0;
        border-bottom: 1px solid rgba(201,162,74,0.05);
        cursor: pointer; text-decoration: none;
        overflow: hidden;
        opacity: 0; transform: translateX(-22px);
        transition:
          opacity 0.45s ease,
          transform 0.45s cubic-bezier(0.23,1,0.32,1);
      }
      .nav-item:first-child { border-top: 1px solid rgba(201,162,74,0.05); }

      /* staggered reveal */
      .menu-overlay.open .nav-item:nth-child(1) { opacity: 1; transform: none; transition-delay: 0.48s; }
      .menu-overlay.open .nav-item:nth-child(2) { opacity: 1; transform: none; transition-delay: 0.56s; }
      .menu-overlay.open .nav-item:nth-child(3) { opacity: 1; transform: none; transition-delay: 0.64s; }
      .menu-overlay.open .nav-item:nth-child(4) { opacity: 1; transform: none; transition-delay: 0.72s; }

      /* hover shimmer background */
      .nav-item::before {
        content: '';
        position: absolute; inset: 0;
        background: linear-gradient(90deg,
          rgba(201,162,74,0.04) 0%,
          transparent 60%);
        transform: translateX(-100%);
        transition: transform 0.4s cubic-bezier(0.23,1,0.32,1);
      }
      .nav-item:hover::before { transform: translateX(0); }

      /* active item: left accent bar */
      .nav-item.active::after {
        content: '';
        position: absolute; left: 0; top: 0; bottom: 0;
        width: 2px;
        background: linear-gradient(180deg, transparent, var(--gold), transparent);
        box-shadow: 0 0 12px rgba(201,162,74,0.5);
      }

      .nav-item-inner {
        display: flex; align-items: baseline;
        gap: 16px; padding-left: 16px;
      }

      .nav-num {
        font-family: "JetBrains Mono", monospace;
        font-size: 8px; letter-spacing: 3px;
        color: var(--gold-dim);
        flex-shrink: 0;
        transition: color 0.3s;
      }
      .nav-item.active .nav-num,
      .nav-item:hover .nav-num { color: var(--gold); }

      .nav-label {
        font-family: "Cinzel", serif;
        font-size: clamp(22px, 7vw, 30px);
        font-weight: 400;
        letter-spacing: 0.04em;
        color: var(--bone-dim);
        transition: color 0.3s, text-shadow 0.3s;
        line-height: 1;
      }
      .nav-item.active .nav-label {
        color: var(--bone);
      }
      .nav-item:hover .nav-label {
        color: var(--bone);
        text-shadow: 0 0 28px rgba(201,162,74,0.18);
      }

      /* active item corner brackets */
      .nav-corner-tl, .nav-corner-br {
        position: absolute;
        width: 8px; height: 8px;
        border-style: solid; border-color: rgba(201,162,74,0.35);
        opacity: 0; transition: opacity 0.3s;
      }
      .nav-corner-tl { top: 8px; left: 8px; border-width: 1px 0 0 1px; }
      .nav-corner-br { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }
      .nav-item.active .nav-corner-tl,
      .nav-item.active .nav-corner-br { opacity: 1; }

      /* subtitle for active */
      .nav-sub {
        font-family: "Cormorant Garamond", serif;
        font-size: 12px; font-style: italic; font-weight: 300;
        color: var(--gold-dim);
        margin-top: 4px;
        padding-left: 40px;
        letter-spacing: 0.03em;
        opacity: 0; max-height: 0; overflow: hidden;
        transition: opacity 0.3s, max-height 0.3s;
      }
      .nav-item.active .nav-sub {
        opacity: 1; max-height: 24px;
      }

      /* ══ FOOTER OF MENU ══ */
      .menu-footer {
        display: flex; flex-direction: column; gap: 16px;
        opacity: 0; transform: translateY(10px);
        transition: opacity 0.5s ease, transform 0.5s ease;
      }
      .menu-overlay.open .menu-footer {
        opacity: 1; transform: translateY(0);
        transition-delay: 0.82s;
      }

      .menu-orn {
        display: flex; align-items: center; gap: 12px;
      }
      .menu-orn::before, .menu-orn::after {
        content: '';
        flex: 1; height: 1px;
        background: linear-gradient(90deg, transparent, rgba(201,162,74,0.12), transparent);
      }
      .menu-orn-d {
        width: 4px; height: 4px;
        background: var(--gold-dim); transform: rotate(45deg); flex-shrink: 0;
      }

      .menu-tagline {
        font-family: "Cormorant Garamond", serif;
        font-size: 13px; font-style: italic; font-weight: 300;
        color: var(--bone-dim);
        text-align: center; letter-spacing: 0.04em;
        opacity: 0.7;
      }

      .menu-version {
        font-family: "JetBrains Mono", monospace;
        font-size: 7px; letter-spacing: 3px; text-transform: uppercase;
        color: rgba(201,162,74,0.25);
        text-align: center;
      }

      /* ══ DEMO INSTRUCTION ══ */
      .demo-hint {
        position: fixed; bottom: 32px; left: 50%;
        transform: translateX(-50%);
        font-family: "JetBrains Mono", monospace;
        font-size: 8px; letter-spacing: 4px; text-transform: uppercase;
        color: rgba(201,162,74,0.3);
        z-index: 10;
        animation: hintPulse 3s ease-in-out infinite;
      }
      @keyframes hintPulse {
        0%,100% { opacity: 0.5; }
        50%      { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div class="demo-bg"></div>
    <div class="demo-grain"></div>

    <!-- NAV LOGO (always visible) -->
    <div class="nav-logo">
      <svg width="36" viewBox="0 0 613 366" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path fill-rule="evenodd" clip-rule="evenodd"
          d="M288.841 46.146C293.104 63.164 294.411 81.573 303.299 97.107C325.889 136.609 370.568 149.719 409.266 166.602C448.926 183.898 485.101 198.622 526.441 211.064C554.06 219.031 584.428 226.543 613 229.958C589.772 232.047 567.585 233.251 545.348 241.341C490.896 261.154 455.302 309.301 405.034 336.378C376.118 352.549 342.428 363.614 309.407 365.631C228.034 370.594 156.821 324.788 100.808 270.409C69.826 240.329 46.14 231.59 3.873 233.998C39.206 222.563 76.544 210.374 110.893 196.244C131.719 187.677 153.615 176.583 174.614 167.361C201.576 155.521 232.546 143.208 255.681 125.206C282.259 104.522 285.384 77.21 288.841 46.146ZM186.868 189.901C162.296 196.041 135.412 203.801 112.617 215.05C140.258 268.656 185.396 302.01 242.39 320.92C289.186 336.445 335.486 330.379 379.135 307.728C408.246 292.444 433.675 271.037 453.652 244.989C462.06 233.667 468.287 224.416 475.31 211.92C446.699 201.199 427.791 195.122 397.098 190.419C385.734 217.643 373.703 233.21 347.931 248.771C328.926 260.244 307.287 266.407 298.388 288.461C292.152 302.791 292.83 314.962 290.316 329.469C283.284 284.931 282.968 270.655 241.441 252.165C219 242.174 195.323 215.339 188.641 192.39C188.055 190.675 188.244 191.161 186.868 189.901ZM291.189 119.862C285.757 140.802 285.287 167.666 264.068 179.993C250.004 188.164 231.156 191.659 215.317 194.703C237.911 198.153 260.984 201.515 276.27 220.408C286.936 233.594 287.25 259.37 292.278 265.801C295.962 244.728 297.927 223.026 317.462 210.068C331.665 200.65 351.476 197.325 368.006 194.537C345.642 190.728 320.292 187.484 306.06 167.68C295.167 152.512 296.944 134.946 291.189 119.862Z"
          fill="#C9A24A"/>
        <path d="M174.092 27.061C216.082 5.198 264.16-3.393 311.107 1.2C385.635 7.242 445.195 45.298 492.124 101.452C517.484 131.787 543.237 164.456 573.822 189.931C585.854 199.957 597.257 203.796 612.029 208.232C589.528 208.793 569.548 204.094 548.51 196.162C525.939 187.769 504.902 175.732 486.241 160.537C441.876 124.183 412.773 75.612 354.471 53.625C284.215 27.133 207.402 44.015 154.972 97.537C131.109 121.896 112.03 148.118 86.776 170.051C60.877 192.542 30.905 204.67 0 218.127C13.719 208.345 26.438 181.177 37.791 169.08C82.573 121.359 113.787 58.461 174.092 27.061Z"
          fill="#C9A24A"/>
      </svg>
    </div>

    <!-- HAMBURGER TRIGGER -->
    <button class="menu-trigger" id="menuTrigger" aria-label="Abrir menu" aria-expanded="false">
      <span class="burger-line"></span>
      <span class="burger-line"></span>
      <span class="burger-line"></span>
    </button>

    <!-- FULL-SCREEN OVERLAY MENU -->
    <div class="menu-overlay" id="menuOverlay" role="dialog" aria-modal="true" aria-label="Navegação">
      <div class="menu-panel">
        <div class="menu-glow"></div>
        <div class="menu-sweep"></div>

        <div class="menu-inner">

          <!-- Brand mark -->
          <div class="menu-brand">
            <svg class="menu-brand-icon" viewBox="0 0 613 366" fill="none">
              <path fill-rule="evenodd" clip-rule="evenodd"
                d="M288.841 46.146C293.104 63.164 294.411 81.573 303.299 97.107C325.889 136.609 370.568 149.719 409.266 166.602C448.926 183.898 485.101 198.622 526.441 211.064C554.06 219.031 584.428 226.543 613 229.958C589.772 232.047 567.585 233.251 545.348 241.341C490.896 261.154 455.302 309.301 405.034 336.378C376.118 352.549 342.428 363.614 309.407 365.631C228.034 370.594 156.821 324.788 100.808 270.409C69.826 240.329 46.14 231.59 3.873 233.998C39.206 222.563 76.544 210.374 110.893 196.244C131.719 187.677 153.615 176.583 174.614 167.361C201.576 155.521 232.546 143.208 255.681 125.206C282.259 104.522 285.384 77.21 288.841 46.146Z"
                fill="#7a6832" opacity="0.7"/>
            </svg>
            <span class="menu-brand-label">MãosFalam</span>
          </div>

          <!-- Navigation -->
          <nav class="menu-nav" role="navigation">

            <a href="#" class="nav-item active" data-sub="Você está aqui">
              <div class="nav-corner-tl"></div>
              <div class="nav-corner-br"></div>
              <div class="nav-item-inner">
                <span class="nav-num">01</span>
                <span class="nav-label">Início</span>
              </div>
              <div class="nav-sub">Você está aqui</div>
            </a>

            <a href="#" class="nav-item" data-sub="Nossa essência">
              <div class="nav-corner-tl"></div>
              <div class="nav-corner-br"></div>
              <div class="nav-item-inner">
                <span class="nav-num">02</span>
                <span class="nav-label">Manifesto</span>
              </div>
              <div class="nav-sub">Nossa essência</div>
            </a>

            <a href="#" class="nav-item" data-sub="Regras do jogo">
              <div class="nav-corner-tl"></div>
              <div class="nav-corner-br"></div>
              <div class="nav-item-inner">
                <span class="nav-num">03</span>
                <span class="nav-label">Termos de uso</span>
              </div>
              <div class="nav-sub">Regras do jogo</div>
            </a>

            <a href="#" class="nav-item" data-sub="Seus dados, protegidos">
              <div class="nav-corner-tl"></div>
              <div class="nav-corner-br"></div>
              <div class="nav-item-inner">
                <span class="nav-num">04</span>
                <span class="nav-label">Privacidade</span>
              </div>
              <div class="nav-sub">Seus dados, protegidos</div>
            </a>

          </nav>

          <!-- Footer -->
          <div class="menu-footer">
            <div class="menu-orn"><div class="menu-orn-d"></div></div>
            <p class="menu-tagline">Me mostre sua mão e eu te conto quem você é</p>
            <p class="menu-version">© 2025 · MãosFalam</p>
          </div>

        </div>
      </div>
    </div>

    <p class="demo-hint">Toque no ≡ para abrir</p>

    <script>
      const trigger  = document.getElementById('menuTrigger');
      const overlay  = document.getElementById('menuOverlay');
      const navItems = overlay.querySelectorAll('.nav-item');

      function openMenu() {
        trigger.classList.add('open');
        overlay.classList.add('open');
        trigger.setAttribute('aria-expanded', 'true');
        document.body.style.overflow = 'hidden';
      }

      function closeMenu() {
        trigger.classList.remove('open');
        overlay.classList.remove('open');
        trigger.setAttribute('aria-expanded', 'false');
        document.body.style.overflow = '';
      }

      trigger.addEventListener('click', () => {
        overlay.classList.contains('open') ? closeMenu() : openMenu();
      });

      // Esc to close
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeMenu();
      });

      // Nav item selection
      navItems.forEach(item => {
        item.addEventListener('click', e => {
          e.preventDefault();
          navItems.forEach(i => i.classList.remove('active'));
          item.classList.add('active');
          // Close after short delay (feel of selection)
          setTimeout(closeMenu, 320);
        });
      });
    </script>
  </body>
</html>
